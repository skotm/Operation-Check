<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>気象情報可視化ツール</title>

    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>

    <style>
        :root {
            --bg-color: #000000;
            --surface-color: rgba(28, 28, 30, 0.75);
            --surface-drawer: rgba(28, 28, 30, 0.85);
            --text-primary: #FFFFFF;
            --text-secondary: rgba(235, 235, 245, 0.6);
            --border-color: rgba(84, 84, 88, 0.4);
            --accent-color: #0A84FF;
            --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            --rail-width: 68px;
            --drawer-width: 320px;
            --bottom-nav-height: 60px;
        }

        body {
            margin: 0; padding: 0;
            height: 100vh; height: 100dvh;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            display: flex;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            touch-action: manipulation;
        }

        /* Navigation Rail */
        #nav-rail {
            position: absolute;
            top: 0; left: 0;
            width: var(--rail-width);
            height: 100%;
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            z-index: 2000;
            box-sizing: border-box;
        }

        .nav-btn {
            position: relative;
            width: 44px; height: 44px;
            margin-bottom: 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text-secondary);
        }

        .nav-btn.active {
            background-color: rgba(255, 255, 255, 0.15);
            color: var(--text-primary);
        }

        .nav-btn svg { width: 24px; height: 24px; }
        .spacer { flex: 1; }

        .nav-btn::before {
            content: '';
            position: absolute;
            left: -10px; top: 50%;
            transform: translateY(-50%) scaleY(0);
            width: 4px; height: 24px;
            background-color: var(--accent-color);
            border-radius: 0 4px 4px 0;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .nav-btn.active::before { transform: translateY(-50%) scaleY(1); }

        /* Drawer Panel */
        #drawer-panel {
            position: absolute;
            left: var(--rail-width);
            top: 0;
            width: var(--drawer-width);
            height: 100%;
            background: var(--surface-drawer);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-right: 1px solid var(--border-color);
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }
        #drawer-panel.show { transform: translateX(0); }

        /* Map */
        #map { 
            position: absolute;
            left: 0; top: 0;
            width: 100%; height: 100%;
        }

        /* スマホ縦画面：下部ナビ分だけ地図の高さを縮める */
        @media (max-width: 768px) {
            #map {
                height: calc(100% - var(--bottom-nav-height) - env(safe-area-inset-bottom, 0px));
            }
        }

        .drawer-header {
            padding: 24px 20px;
            font-size: 18px;
            font-weight: 700;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        
        #ranking-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        #ranking-list::-webkit-scrollbar { width: 0px; }

        .rank-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .rank-item:hover { background: rgba(255, 255, 255, 0.1); }
        .rank-num { color: var(--text-secondary); display: inline-block; width: 24px; font-size: 12px; }
        .rank-name { flex: 1; font-weight: 500; font-size: 14px; }
        .rank-val { font-weight: 700; font-size: 16px; }

        /* PC: ドロワー展開時にdetail-cardをずらす */
        body.drawer-open #detail-card {
            left: calc(var(--drawer-width) + var(--rail-width) + 14px);
        }
        #detail-card, #legend-card {
            position: absolute;
            background: var(--surface-drawer);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 14px;
            border: 1px solid var(--border-color);
            z-index: 1500;
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1),
                        left 0.4s cubic-bezier(0.2, 0.8, 0.2, 1),
                        bottom 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        #detail-card {
            bottom: 18px;
            left: calc(var(--rail-width) + 14px);
            width: 230px;
            padding: 8px 10px 10px;
            transform: translateY(120%);
        }
        #detail-card.show { transform: translateY(0); }

        /* ×ボタン・−ボタン */
        #close-detail {
            position: absolute; top: 6px; left: 6px;
            width: 24px; height: 24px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-secondary);
            font-size: 14px;
        }

        #legend-card { bottom: 18px; right: 14px; min-width: 132px; padding: 8px 10px; }
        #legend-toggle {
            position: absolute; top: 6px; right: 6px;
            width: 24px; height: 24px;
            border: 0; border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
            color: var(--text-primary);
            font-size: 16px; line-height: 24px;
            cursor: pointer;
        }
        #legend-card.collapsed #legend-content { display: none; }
        #legend-card.collapsed { min-width: 96px; }

        /* MapLibre コントロール */
        .maplibregl-ctrl-bottom-right {
            transition: margin-bottom 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* ==========================================
           スマホ縦画面対応
        ========================================== */
        @media (max-width: 768px) {

            /* ナビを下部バーに */
            #nav-rail {
                top: auto; bottom: 0; left: 0;
                width: 100%;
                height: calc(var(--bottom-nav-height) + env(safe-area-inset-bottom, 0px));
                flex-direction: row;
                justify-content: space-around;
                border-right: none;
                border-top: 1px solid var(--border-color);
                padding: 0 10px calc(env(safe-area-inset-bottom, 0px));
            }
            .nav-btn { margin-bottom: 0; flex-shrink: 0; }
            .spacer { display: none; }

            /* インジケーターを上端に */
            .nav-btn::before {
                left: 50%; top: 0; bottom: auto;
                transform: translateX(-50%) scaleX(0);
                width: 24px; height: 4px;
                border-radius: 0 0 4px 4px;
                transform-origin: top;
            }
            .nav-btn.active::before { transform: translateX(-50%) scaleX(1); }

            /* ドロワーを下から上にスライド */
            #drawer-panel {
                top: auto;
                bottom: calc(var(--bottom-nav-height) + env(safe-area-inset-bottom, 0px));
                left: 0; width: 100%; height: 55vh;
                border-right: none;
                border-top: 1px solid var(--border-color);
                border-radius: 16px 16px 0 0;
                transform: translateY(100%);
            }
            #drawer-panel.show { transform: translateY(0); }

            /* ---- detail-card ----
               スマホではコンパクトに・左下固定・横幅は自然なサイズ */
            #detail-card {
                left: 10px;
                bottom: calc(var(--bottom-nav-height) + env(safe-area-inset-bottom, 0px) + 8px);
                width: auto;
                max-width: calc(100vw - 20px);
                min-width: 200px;
                box-sizing: border-box;
                padding: 6px 8px 8px;
                /* show前は確実に画面外へ（bottomがあってもtransformで隠す） */
                transform: translateY(calc(100% + var(--bottom-nav-height) + env(safe-area-inset-bottom, 0px) + 20px));
            }
            #detail-card.show {
                transform: translateY(0);
            }
            /* ドロワー展開中はdetail-cardを非表示 */
            body.drawer-open #detail-card {
                left: 10px;
                opacity: 0;
                pointer-events: none;
                transform: translateY(calc(100% + var(--bottom-nav-height) + env(safe-area-inset-bottom, 0px) + 20px));
            }

            /* ---- legend-card ----
               ナビバー直上に密着 */
            #legend-card {
                bottom: calc(var(--bottom-nav-height) + env(safe-area-inset-bottom, 0px) + 8px);
                right: 10px;
                left: auto;
            }
            /* ドロワー展開中はlegend-cardも非表示 */
            body.drawer-open #legend-card {
                opacity: 0;
                pointer-events: none;
            }

            /* ×・−ボタンをタップしやすく */
            #close-detail {
                width: 32px; height: 32px;
                font-size: 16px;
                top: 6px; left: 6px;
            }
            #legend-toggle {
                width: 32px; height: 32px;
                font-size: 18px; line-height: 32px;
                top: 6px; right: 6px;
            }

            /* status-bar */
            #status-bar { top: 12px; right: 12px; }

            /* MapLibre コントロールをナビの上に */
            .maplibregl-ctrl-bottom-right {
                margin-bottom: calc(var(--bottom-nav-height) + env(safe-area-inset-bottom, 0px) + 10px);
            }
            body.drawer-open .maplibregl-ctrl-bottom-right {
                margin-bottom: calc(var(--bottom-nav-height) + env(safe-area-inset-bottom, 0px) + 55vh + 10px);
            }
        }

        @media (max-width: 768px) and (orientation: landscape) {
            #drawer-panel { height: 80vh; }
            body.drawer-open .maplibregl-ctrl-bottom-right {
                margin-bottom: calc(var(--bottom-nav-height) + env(safe-area-inset-bottom, 0px) + 80vh + 10px);
            }
            #nav-rail { padding: 0 40px calc(env(safe-area-inset-bottom, 0px)); }
        }

        .card-header { font-size: 15px; font-weight: 700; margin: 4px 0 3px; text-align: center; }
        .card-time { font-size: 11px; color: var(--text-secondary); margin-bottom: 7px; text-align: center; }
        
        .legend-item { display: flex; align-items: center; margin-bottom: 4px; font-size: 12px; color: var(--text-secondary); }
        .legend-color { width: 11px; height: 11px; border-radius: 3px; margin-right: 7px; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.2); }

        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .data-item { background: rgba(255, 255, 255, 0.05); padding: 6px 8px; border-radius: 8px; display: flex; flex-direction: column; }
        .data-label { font-size: 10px; color: var(--text-secondary); margin-bottom: 1px; }
        .data-value { font-size: 16px; font-weight: 700; }
        .data-value span { font-size: 11px; font-weight: 400; margin-left: 2px; }

        #status-bar {
            position: absolute; top: 20px; right: 20px;
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            padding: 8px 16px; border-radius: 40px;
            font-size: 12px; border: 1px solid var(--border-color);
            z-index: 1000;
        }

        .forecast-time-marker {
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.55);
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            line-height: 1.25;
            white-space: nowrap;
            text-shadow: 0 1px 2px #000;
            pointer-events: auto;
            cursor: pointer;
        }

        /* 警報バッジ */
        .warn-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 4px;
            white-space: nowrap;
        }
        .warn-badge.tokubetsu { background: #1a1a1a; color: #fff; border: 1px solid #666; }
        .warn-badge.kiken     { background: #AA00AA; color: #fff; }
        .warn-badge.keiho     { background: #FF2800; color: #fff; }
        .warn-badge.chui      { background: #FFEF00; color: #000; }

        .warn-rank-item {
            padding: 10px 14px;
            border-radius: 10px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .warn-rank-item:hover { background: rgba(255,255,255,0.08); }
        .warn-rank-area { font-size: 13px; font-weight: 600; margin-bottom: 5px; }
        .warn-rank-badges { display: flex; flex-wrap: wrap; gap: 3px; }
    </style>
</head>
<body>

    <nav id="nav-rail">
        <div class="nav-btn" id="btn-temp" title="気温レイヤー">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/></svg>
        </div>
        <div class="nav-btn" id="btn-prec" title="降水量レイヤー">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 18H8a5 5 0 1 1 1.1-9.88A6.5 6.5 0 0 1 21 11.5 3.5 3.5 0 0 1 17.5 18z"/><path d="M8 21l1-2"/><path d="M12 21l1-2"/><path d="M16 21l1-2"/></svg>
        </div>
        <div class="nav-btn" id="btn-wind" title="風向・風速レイヤー">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="12" y2="7"/><line x1="12" y1="17" x2="22" y2="17"/></svg>
        </div>
        <div class="nav-btn" id="btn-typhoon" title="台風情報レイヤー">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 12m-3 0a3 3 0 1 0 6 0 3 3 0 1 0-6 0"/>
                <path d="M12 9a9 9 0 0 1 9 9"/>
                <path d="M12 15a9 9 0 0 1-9-9"/>
            </svg>
        </div>
        <div class="nav-btn" id="btn-warning" title="注意報・警報レイヤー">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                <line x1="12" y1="9" x2="12" y2="13"/>
                <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
        </div>
        <div class="spacer"></div>
        <div class="nav-btn" id="btn-rank" title="全国ランキング">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/></svg>
        </div>
    </nav>

    <div id="drawer-panel">
        <div class="drawer-header" id="rank-title">全国ランキング</div>
        <div id="ranking-list"></div>
    </div>

    <div id="map">
        <div id="status-bar">データ読込中...</div>
        
        <div id="legend-card">
            <button id="legend-toggle" type="button" title="凡例を非表示">−</button>
            <div class="card-header" id="legend-title">凡例</div>
            <div id="legend-content"></div>
        </div>

        <div id="detail-card">
            <div id="close-detail">×</div>
            <div class="card-header" id="st-name" style="margin-top: 10px;">地点名</div>
            <div class="card-time" id="st-time">--:-- 観測</div>
            <div class="data-grid" id="detail-grid"></div>
        </div>
    </div>

    <script>
        const JMA_BASE = "https://www.jma.go.jp/bosai/amedas";
        const MAP_DATA_PATHS = {
            world: 'world.json',
            prefectures: 'prefectures.json'
        };
        let map, amedasTable = {};
        let geojson = { type: 'FeatureCollection', features: [] };
        let typhoonGeojson = { type: 'FeatureCollection', features: [] };
        let forecastTimeMarkers = [];
        let legendCollapsed = false;
        let currentMode = 'temp';
        let currentObsTime = '--:--';

        // 警報関連
        // 気象庁 offices コード（area.jsonのofficesキーと一致）
        const WARNING_PREF_CODES = [
            // 北海道
            '011000','012000','013000','014030','014100','015000','016000','017000',
            // 東北
            '020000','030000','040000','050000','060000','070000',
            // 関東甲信
            '080000','090000','100000','110000','120000','130000','140000','190000','200000',
            // 東海
            '210000','220000','230000','240000',
            // 北陸
            '150000','160000','170000','180000',
            // 近畿
            '250000','260000','270000','280000','290000','300000',
            // 中国
            '310000','320000','330000','340000','350000',
            // 四国
            '360000','370000','380000','390000',
            // 九州北部
            '400000','410000','420000','430000','440000',
            // 九州南部・奄美
            '450000','460040','460100',
            // 沖縄
            '471000','472000','473000','474000'
        ];

        // 新API(r8)の警報種別コード（2桁文字列）→ {name, level}
        // 参考: 気象庁 bosai warning data r8 warnArea定義
        const WARNING_KIND_MAP = {
            // 注意報 level=2
            '10': { name: '大雨注意報',     level: 'chui' },
            '12': { name: '大雪注意報',     level: 'chui' },
            '13': { name: '風雪注意報',     level: 'chui' },
            '14': { name: '雷注意報',       level: 'chui' },
            '15': { name: '強風注意報',     level: 'chui' },
            '16': { name: '波浪注意報',     level: 'chui' },
            '17': { name: '融雪注意報',     level: 'chui' },
            '18': { name: '洪水注意報',     level: 'chui' },
            '19': { name: '高潮注意報',     level: 'chui' },
            '20': { name: '濃霧注意報',     level: 'chui' },
            '21': { name: '乾燥注意報',     level: 'chui' },
            '22': { name: 'なだれ注意報',   level: 'chui' },
            '23': { name: '低温注意報',     level: 'chui' },
            '24': { name: '霜注意報',       level: 'chui' },
            '25': { name: '着氷注意報',     level: 'chui' },
            '26': { name: '着雪注意報',     level: 'chui' },
            '27': { name: 'その他の注意報', level: 'chui' },
            '29': { name: '土砂災害注意報', level: 'chui' },
            // 警報 level=3
            '02': { name: '暴風雪警報',     level: 'keiho' },
            '03': { name: '大雨警報',       level: 'keiho' },
            '04': { name: '洪水警報',       level: 'keiho' },
            '05': { name: '暴風警報',       level: 'keiho' },
            '06': { name: '大雪警報',       level: 'keiho' },
            '07': { name: '波浪警報',       level: 'keiho' },
            '08': { name: '高潮警報',       level: 'keiho' },
            '09': { name: '土砂災害警報',   level: 'keiho' },
            // 危険警報 level=4（2026年5月新設）
            '43': { name: '大雨危険警報',       level: 'kiken' },
            '48': { name: '高潮危険警報',       level: 'kiken' },
            '49': { name: '土砂災害危険警報',   level: 'kiken' },
            // 特別警報 level=5
            '32': { name: '暴風雪特別警報',     level: 'tokubetsu' },
            '33': { name: '大雨特別警報',       level: 'tokubetsu' },
            '35': { name: '暴風特別警報',       level: 'tokubetsu' },
            '36': { name: '大雪特別警報',       level: 'tokubetsu' },
            '37': { name: '波浪特別警報',       level: 'tokubetsu' },
            '38': { name: '高潮特別警報',       level: 'tokubetsu' },
            '39': { name: '土砂災害特別警報',   level: 'tokubetsu' },
        };
        const LEVEL_PRIORITY = { tokubetsu: 4, kiken: 3, keiho: 2, chui: 1 };
        const LEVEL_COLOR = {
            tokubetsu: '#1a1a1a',
            kiken:     '#AA00AA',
            keiho:     '#FF2800',
            chui:      '#FFEF00',
        };
        // code → {level, kinds[]} の警報マップ（取得後に構築）
        let warningMap = {};          // regioncode → {level, kinds}
        let warningAreasGeojson = null;

        const arrowSvg = `<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2.5 L20 10.5 L14 10.5 L14 21.5 L10 21.5 L10 10.5 L4 10.5 Z" fill="white" stroke="white" stroke-linejoin="round" stroke-width="1.5" />
        </svg>`;

        function getTempColor(temp) {
            if (temp === null) return 'transparent';
            if (temp >= 35) return '#B40068';
            if (temp >= 30) return '#FF2800';
            if (temp >= 25) return '#FF9900';
            if (temp >= 20) return '#FFEF00';
            if (temp >= 15) return '#99FF00';
            if (temp >= 10) return '#00FF00';
            if (temp >= 5)  return '#00FFFF';
            if (temp >= 0)  return '#0099FF';
            if (temp >= -5) return '#0000FF';
            return '#10008F';
        }

        async function loadMapData(path) {
            const res = await fetch(path);
            if (!res.ok) throw new Error(`Failed to load map data: ${path}`);

            const data = await res.json();
            if (data.type === 'FeatureCollection') return data;
            if (data.type === 'Feature') return { type: 'FeatureCollection', features: [data] };

            if (data.type === 'GeometryCollection') {
                return {
                    type: 'FeatureCollection',
                    features: data.geometries.map((geometry, index) => ({
                        type: 'Feature',
                        properties: { id: index },
                        geometry
                    }))
                };
            }

            return data;
        }

        function getPrecColor(prec) {
            if (prec === null || prec === 0) return 'transparent';
            if (prec >= 80) return '#B40068';
            if (prec >= 50) return '#FF2800';
            if (prec >= 30) return '#FF9900';
            if (prec >= 20) return '#FFEF00';
            if (prec >= 10) return '#0000FF';
            if (prec >= 1)  return '#0099FF';
            return '#A0D2FF';
        }
        function getPointRadiusExpression(mode) {
            const valueRadius = mode === 'temp'
                ? ['step', ['get', 'sizeTemp'], 9, 5, 11, 10, 13, 15, 16, 20, 19, 25, 22, 30, 25, 35, 29]
                : ['step', ['get', 'sizePrec'], 9, 5, 11, 10, 14, 15, 18, 20, 22, 30, 27, 50, 32, 80, 37];

            return ['interpolate', ['linear'], ['zoom'], 4, 5, 6, ['*', 0.65, valueRadius], 8, ['*', 0.82, valueRadius], 10, valueRadius];
        }

        // 気象庁の座標を GeoJSON 用の [経度, 緯度] に変換
        function parseJMACoord(coord) {
            if (!coord) return null;

            if (Array.isArray(coord) && coord.length >= 2) {
                const lat = Number(coord[0]);
                const lon = Number(coord[1]);
                return Number.isFinite(lat) && Number.isFinite(lon) ? [lon, lat] : null;
            }

            const match = String(coord).match(/([+-]\d+(?:\.\d+)?)([+-]\d+(?:\.\d+)?)/);
            if (match) {
                const lat = parseFloat(match[1]);
                const lon = parseFloat(match[2]);
                return [lon, lat];
            }
            return null;
        }

        function getJMATyphoonRadiusKm(value) {
            if (value == null) return null;
            if (typeof value === 'number') return value / 1000;
            if (Array.isArray(value)) return getJMATyphoonRadiusKm(value[0]);
            if (typeof value === 'object') {
                if (typeof value.radius === 'number') return value.radius / 1000;
                if (typeof value.base === 'number') return value.base / 1000;
                if (Array.isArray(value.base)) return getJMATyphoonRadiusKm(value.base[0]);
            }
            return null;
        }
        function getPointDistanceSq(a, b) {
            const dx = a[0] - b[0];
            const dy = a[1] - b[1];
            return dx * dx + dy * dy;
        }

        function makeStormWarningArcSegment(arc) {
            const center = parseJMACoord(arc?.[0]);
            const radiusKm = getJMATyphoonRadiusKm(arc?.[1]);
            const angles = arc?.[2];
            if (!center || !radiusKm || !Array.isArray(angles)) return null;

            let start = Number(angles[0]);
            let end = Number(angles[1]);
            if (!Number.isFinite(start) || !Number.isFinite(end)) return null;
            if (end < start) end += 360;

            const span = Math.max(1, end - start);
            const steps = Math.max(8, Math.ceil(span / 5));
            const centerPoint = turf.point(center);
            const coordinates = [];
            for (let i = 0; i <= steps; i++) {
                const bearing = start + (span * i / steps);
                coordinates.push(turf.destination(centerPoint, radiusKm, bearing, { units: 'kilometers' }).geometry.coordinates);
            }
            return coordinates;
        }

        function buildStormWarningAreaFeature(stormWarningArea) {
            const segments = [];

            (stormWarningArea?.arc || []).forEach(arc => {
                const segment = makeStormWarningArcSegment(arc);
                if (segment && segment.length >= 2) segments.push(segment);
            });

            (stormWarningArea?.line || []).forEach(line => {
                const start = parseJMACoord(line?.[0]);
                const end = parseJMACoord(line?.[1]);
                if (start && end) segments.push([start, end]);
            });

            if (segments.length === 0) return null;
            const unused = segments.slice(1);
            const ring = segments[0].slice();

            while (unused.length > 0) {
                const tail = ring[ring.length - 1];
                let bestIndex = 0;
                let bestReverse = false;
                let bestDistance = Infinity;

                unused.forEach((segment, index) => {
                    const startDistance = getPointDistanceSq(tail, segment[0]);
                    const endDistance = getPointDistanceSq(tail, segment[segment.length - 1]);
                    if (startDistance < bestDistance) {
                        bestIndex = index;
                        bestReverse = false;
                        bestDistance = startDistance;
                    }
                    if (endDistance < bestDistance) {
                        bestIndex = index;
                        bestReverse = true;
                        bestDistance = endDistance;
                    }
                });

                const next = unused.splice(bestIndex, 1)[0];
                const ordered = bestReverse ? next.slice().reverse() : next;
                ring.push(...ordered.slice(1));
            }

            if (getPointDistanceSq(ring[0], ring[ring.length - 1]) > 0) {
                ring.push(ring[0]);
            }

            return turf.polygon([ring], { type: 'stormWarningArea' });
        }

        function formatForecastTimeLabel(time) {
            if (!time) return '予報';
            const date = new Date(time);
            if (Number.isNaN(date.getTime())) return '予報';
            const day = date.getDate();
            const hour = date.getHours();
            if (hour === 0) return `${day}日午前0時`;
            if (hour < 12) return `${day}日午前${hour}時`;
            if (hour === 12) return `${day}日午後0時`;
            return `${day}日午後${hour - 12}時`;
        }

        // ---- 警報データ取得（新API r8 のみ）----
        async function fetchWarningData() {
            warningMap = {};

            const results = await Promise.allSettled(
                WARNING_PREF_CODES.map(code =>
                    fetch(`https://www.jma.go.jp/bosai/warning/data/r8/${code}.json`, { cache: 'no-store' })
                        .then(r => r.ok ? r.json() : null)
                        .catch(() => null)
                )
            );

            results.forEach(result => {
                if (result.status !== 'fulfilled' || !result.value) return;
                const dataArr = result.value;
                const arr = Array.isArray(dataArr) ? dataArr : [dataArr];

                arr.forEach(entry => {
                    // 新API: entry.warning.class20Items[].areaCode が7桁の市区町村コード
                    const items = entry?.warning?.class20Items ?? [];
                    items.forEach(item => {
                        const regioncode = String(item.areaCode ?? '').trim();
                        if (!regioncode) return;

                        const kinds = (item.kinds ?? [])
                            .filter(k => {
                                const s = String(k.status ?? '').trim();
                                return s !== '' && s !== '解除';
                            })
                            .map(k => {
                                // コードは数値の場合もあるので2桁ゼロ埋め文字列に正規化
                                const codeStr = String(k.code ?? '').trim().padStart(2, '0');
                                return WARNING_KIND_MAP[codeStr] ?? null;
                            })
                            .filter(Boolean);

                        if (kinds.length === 0) return;
                        mergeWarning(regioncode, kinds);
                    });
                });
            });

            console.log(`[警報] warningMap件数: ${Object.keys(warningMap).length}`);
            if (Object.keys(warningMap).length > 0) {
                console.log('[警報] サンプル:', Object.entries(warningMap).slice(0, 3));
            }
        }

        function mergeWarning(regioncode, newKinds) {
            const existing = warningMap[regioncode];
            const merged = existing ? [...existing.kinds, ...newKinds] : newKinds;
            const seen = new Set();
            const deduped = merged.filter(k => {
                if (seen.has(k.name)) return false;
                seen.add(k.name);
                return true;
            });
            const topLevel = deduped.reduce((best, k) =>
                (LEVEL_PRIORITY[k.level] ?? 0) > (LEVEL_PRIORITY[best.level] ?? 0) ? k : best
            );
            warningMap[regioncode] = { level: topLevel.level, kinds: deduped };
        }

        function applyWarningColors() {
            if (!warningAreasGeojson || !map.getSource('warning-areas')) return;
            const updated = {
                ...warningAreasGeojson,
                features: warningAreasGeojson.features.map(f => {
                    const code = f.properties.regioncode;
                    const warn = warningMap[code];
                    return {
                        ...f,
                        properties: {
                            ...f.properties,
                            warnLevel: warn ? warn.level : '',
                            warnColor: warn ? LEVEL_COLOR[warn.level] : 'transparent',
                        }
                    };
                })
            };
            map.getSource('warning-areas').setData(updated);
        }

        async function fetchJsonOrNull(url) {

        // --- 台風データの取得と空間処理（コアロジック） ---
        async function fetchTyphoonData() {
            const features = [];
            const base = 'https://www.jma.go.jp/bosai/typhoon/data';

            try {
                const targetTc = await fetchJsonOrNull(`${base}/targetTc.json`);
                if (!Array.isArray(targetTc) || targetTc.length === 0) {
                    return turf.featureCollection([]);
                }

                const typhoonData = await Promise.all(targetTc.map(async (tc) => {
                    const id = tc.tropicalCyclone;
                    const [forecast, specifications] = await Promise.all([
                        fetchJsonOrNull(`${base}/${id}/forecast.json`),
                        fetchJsonOrNull(`${base}/${id}/specifications.json`)
                    ]);
                    return { tc, forecast: Array.isArray(forecast) ? forecast : [], specifications: Array.isArray(specifications) ? specifications : [] };
                }));

                typhoonData.forEach(({ tc, forecast, specifications }) => {
                    const title = forecast.find(item => item.part === 'title') || specifications.find(item => item.part === 'title') || tc;
                    const specNow = specifications.find(item => item.advancedHours === 0) || {};
                    const points = forecast.filter(item => item && item.advancedHours !== undefined && item.center);
                    const current = points.find(item => item.advancedHours === 0) || points[0];
                    if (!current) return;

                    const centerPos = parseJMACoord(current.center);
                    if (!centerPos) return;

                    const typhoonNo = String(title.typhoonNumber || tc.typhoonNumber || '').slice(-2).replace(/^0/, '');
                    const name = title.name?.jp || title.name?.en || '';
                    const maxWind = specNow.maximumWind?.sustained?.['m/s'] || specNow.maximumWind?.sustained?.mps || '不明';
                    const maxGust = specNow.maximumWind?.gust?.['m/s'] || specNow.maximumWind?.gust?.mps || '不明';

                    features.push(turf.point(centerPos, {
                        type: 'center',
                        name: `${Number(typhoonNo) ? `台風第${Number(typhoonNo)}号` : '熱帯低気圧'}${name ? ` (${name})` : ''}`,
                        pressure: specNow.pressure || '不明',
                        maxWind,
                        maxGust,
                        scale: specNow.scale || '-',
                        intensity: specNow.intensity || tc.category || '-',
                        speed: specNow.speed?.['km/h'] ? `${specNow.course || ''} ${specNow.speed['km/h']}km/h`.trim() : (specNow.course || '-')
                    }));

                    const stormRadiusKm = getJMATyphoonRadiusKm(current.stormWarningArea?.arc?.[0]?.[1]);
                    if (stormRadiusKm) {
                        features.push(turf.circle(centerPos, stormRadiusKm, { steps: 64, units: 'kilometers', properties: { type: 'stormArea' } }));
                    }

                    const galeRadiusKm = getJMATyphoonRadiusKm(current.galeWarningArea?.radius);
                    if (galeRadiusKm) {
                        const galeCenter = parseJMACoord(current.galeWarningArea?.center) || centerPos;
                        features.push(turf.circle(galeCenter, galeRadiusKm, { steps: 64, units: 'kilometers', properties: { type: 'windArea' } }));
                    }

                    const pastTrack = [
                        ...(current.track?.preTyphoon || []),
                        ...(current.track?.typhoon || [])
                    ].map(point => parseJMACoord(point)).filter(Boolean);
                    if (pastTrack.length >= 2) {
                        features.push(turf.lineString(pastTrack, { type: 'pastTrack' }));
                    }

                    const forecastTrack = points.map(item => parseJMACoord(item.center)).filter(Boolean);
                    if (forecastTrack.length >= 2) {
                        features.push(turf.lineString(forecastTrack, { type: 'track' }));
                    }

                    const stormWarningSource = points.slice().reverse().find(item => item.stormWarningArea?.arc?.length);
                    const stormWarningArea = buildStormWarningAreaFeature(stormWarningSource?.stormWarningArea);
                    if (stormWarningArea) {
                        features.push(stormWarningArea);
                    }

                    const forecastCircles = [];
                    points.forEach(item => {
                        if (item.advancedHours === 0 || !item.probabilityCircle?.radius) return;
                        const fPos = parseJMACoord(item.center);
                        const radiusKm = getJMATyphoonRadiusKm(item.probabilityCircle.radius);
                        if (!fPos || !radiusKm) return;

                        const forecastLabel = formatForecastTimeLabel(item.validtime?.JST || item.validtime?.UTC);
                        const forecastSpec = specifications.find(spec => spec.advancedHours === item.advancedHours) || {};
                        const labelPoint = turf.destination(turf.point(fPos), radiusKm + 35, 45, { units: 'kilometers' }).geometry.coordinates;
                        const circle = turf.circle(fPos, radiusKm, {
                            steps: 64,
                            units: 'kilometers',
                            properties: {
                                type: 'forecastCircle',
                                name: `${Number(typhoonNo) ? `台風第${Number(typhoonNo)}号` : '熱帯低気圧'}${name ? ` (${name})` : ''}`,
                                forecastTime: forecastLabel,
                                labelPoint,
                                pressure: forecastSpec.pressure || '不明',
                                maxWind: forecastSpec.maximumWind?.sustained?.['m/s'] || '不明',
                                maxGust: forecastSpec.maximumWind?.gust?.['m/s'] || '不明',
                                scale: forecastSpec.scale || '-',
                                intensity: forecastSpec.intensity || tc.category || '-',
                                speed: forecastSpec.speed?.['km/h'] ? `${forecastSpec.course || ''} ${forecastSpec.speed['km/h']}km/h`.trim() : (forecastSpec.course || '-')
                            }
                        });
                        forecastCircles.push(circle);
                        features.push(circle);
                    });

                    if (forecastCircles.length > 0) {
                        let previousCircle = turf.circle(centerPos, 1, { steps: 64, units: 'kilometers' });
                        let finalWarningArea = null;

                        forecastCircles.forEach(circle => {
                            const warningAreaSegment = turf.convex(turf.explode(turf.featureCollection([previousCircle, circle])));
                            if (warningAreaSegment) {
                                finalWarningArea = finalWarningArea ? turf.union(finalWarningArea, warningAreaSegment) || finalWarningArea : warningAreaSegment;
                            }
                            previousCircle = circle;
                        });

                        if (finalWarningArea) {
                            finalWarningArea.properties = { type: 'forecastArea' };
                            features.push(finalWarningArea);
                        }
                    }
                });

                return turf.featureCollection(features);
            } catch (e) {
                console.warn('Typhoon data fetch failed:', e);
                return turf.featureCollection([]);
            }
        }

                        fetch(`${JMA_BASE}/data/map/${mapTime}.json`)
                    ]);
                    amedasTable = await tableRes.json();
                    const amedasData = await dataRes.json();

                    geojson.features = Object.keys(amedasData).map(id => {
                        const master = amedasTable[id];
                        if (!master) return null;
                        const obs = amedasData[id];
                        
                        const temp = obs.temp !== undefined ? obs.temp[0] : null;
                        const prec = obs.precipitation1h !== undefined ? obs.precipitation1h[0] : null;
                        const windSpd = obs.wind !== undefined ? obs.wind[0] : null;
                        const windDir = obs.windDirection !== undefined ? obs.windDirection[0] : 0; 

                        return {
                            type: 'Feature',
                            geometry: { type: 'Point', coordinates: [master.lon[0] + master.lon[1]/60, master.lat[0] + master.lat[1]/60] },
                            properties: {
                                id, type: 'amedas', name: master.kjName,
                                temp: temp, prec: prec, wind: windSpd, windDir: windDir, 
                                hum: obs.humidity !== undefined ? obs.humidity[0] : null,
                                sortTemp: temp !== null ? temp : -100,
                                sortPrec: prec !== null ? prec : -1,
                                sortWind: windSpd !== null ? windSpd : -1,
                                sizeTemp: temp !== null ? Math.abs(temp) : 0,
                                sizePrec: prec !== null ? prec : 0,
                                tempColor: getTempColor(temp),
                                precColor: getPrecColor(prec)
                            }
                        };
                    }).filter(f => f !== null && f.geometry.coordinates[0]);

                    map.addSource('amedas', { type: 'geojson', data: geojson });
                    
                    map.addLayer({ 
                        id: 'layer-points', 
                        type: 'circle', 
                        source: 'amedas', 
                        filter: ['!=', ['get', 'temp'], null],
                        layout: { 'circle-sort-key': ['get', 'sortTemp'] },
                        paint: { 
                            'circle-radius': getPointRadiusExpression('temp'), 
                            'circle-color': ['get', 'tempColor'], 
                            'circle-stroke-width': 1.5, 
                            'circle-stroke-color': '#000000' 
                        } 
                    });
                    
                    map.addLayer({ 
                        id: 'layer-wind', 
                        type: 'symbol', 
                        source: 'amedas',
                        filter: ['!=', ['get', 'wind'], null],
                        layout: { 
                            'visibility': 'none', 
                            'icon-image': 'wind-arrow', 
                            'symbol-sort-key': ['get', 'sortWind'],
                            'icon-size': ['interpolate', ['linear'], ['get', 'wind'], 0, 0.4, 2, 0.6, 5, 1.0, 10, 1.6, 20, 2.4],
                            'icon-rotate': ['+', ['*', ['get', 'windDir'], 22.5], 180], 
                            'icon-allow-overlap': true,
                            'icon-ignore-placement': true 
                        }, 
                        paint: { 
                            'icon-opacity': ['case', ['==', ['get', 'windDir'], 0], 0, 1],
                            'icon-color': ['step', ['get', 'wind'], '#0099FF', 5, '#00FFFF', 10, '#00FF00', 15, '#FFEF00', 20, '#FF9900', 25, '#FF2800', 30, '#B40068']
                        } 
                    });

                    map.on('click', 'layer-points', (e) => showDetail(e.features[0].properties));
                    map.on('click', 'layer-wind', (e) => showDetail(e.features[0].properties));
                    map.on('click', 'layer-typhoon-center', (e) => showDetail(e.features[0].properties));
                    
                    // マウスカーソルをポインターにする
                    ['layer-points', 'layer-wind', 'layer-typhoon-center'].forEach(layer => {
                        map.on('mouseenter', layer, () => map.getCanvas().style.cursor = 'pointer');
                        map.on('mouseleave', layer, () => map.getCanvas().style.cursor = '');
                    });

                    setMode('temp', false);
                } catch (e) { console.error("Initialization failed:", e); }
            });
        }

        function handleNavClick(mode) {
            const drawer = document.getElementById('drawer-panel');
            const isOpen = drawer.classList.contains('show');

            if (isMobile()) {
                if (currentMode === mode) {
                    // 同じタブ：開閉トグル
                    toggleDrawer(!isOpen);
                } else {
                    // 別タブ：モード切替のみ、ドロワーは開かない
                    setMode(mode, false);
                }
            } else {
                // PC：従来通り（同じタブで閉じる、別タブで開く）
                if (currentMode === mode && isOpen) {
                    toggleDrawer(false);
                } else {
                    setMode(mode, true);
                }
            }
        }

        function toggleDrawer(forceOpen = null) {
            const drawer = document.getElementById('drawer-panel');
            const targetState = (forceOpen !== null) ? forceOpen : !drawer.classList.contains('show');
            if (targetState) {
                drawer.classList.add('show');
                document.body.classList.add('drawer-open');
                document.getElementById('btn-rank').classList.add('active');
                updateRanking();
            } else {
                drawer.classList.remove('show');
                document.body.classList.remove('drawer-open');
                document.getElementById('btn-rank').classList.remove('active');
            }
        }

        function setMode(mode, openDrawer = true) {
            currentMode = mode;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(mode !== 'rank') document.getElementById(`btn-${mode}`).classList.add('active');
            
            if (map.getLayer('layer-points')) {
                const pointsVis   = (mode === 'temp' || mode === 'prec') ? 'visible' : 'none';
                const windVis     = (mode === 'wind') ? 'visible' : 'none';
                const typhoonVis  = (mode === 'typhoon') ? 'visible' : 'none';
                const warningVis  = (mode === 'warning') ? 'visible' : 'none';

                map.setLayoutProperty('layer-points', 'visibility', pointsVis);
                map.setLayoutProperty('layer-wind',   'visibility', windVis);

                map.setLayoutProperty('layer-typhoon-area',                'visibility', typhoonVis);
                map.setLayoutProperty('layer-typhoon-past-track',          'visibility', typhoonVis);
                map.setLayoutProperty('layer-typhoon-track',               'visibility', typhoonVis);
                map.setLayoutProperty('layer-typhoon-forecast-fill',       'visibility', typhoonVis);
                map.setLayoutProperty('layer-typhoon-storm-warning-fill',  'visibility', typhoonVis);
                map.setLayoutProperty('layer-typhoon-storm-warning-line',  'visibility', typhoonVis);
                map.setLayoutProperty('layer-typhoon-forecast-area-line',  'visibility', typhoonVis);
                map.setLayoutProperty('layer-typhoon-forecast-circle-line','visibility', typhoonVis);
                map.setLayoutProperty('layer-typhoon-center',              'visibility', typhoonVis);
                updateForecastTimeMarkers(mode === 'typhoon');

                map.setLayoutProperty('layer-warning-fill', 'visibility', warningVis);
                map.setLayoutProperty('layer-warning-line', 'visibility', warningVis);

                if (mode === 'warning') {
                    loadWarningMode();
                }

                if (mode === 'temp' || mode === 'prec') {
                    map.setPaintProperty('layer-points', 'circle-color', mode === 'temp' ? ['get', 'tempColor'] : ['get', 'precColor']);
                    map.setPaintProperty('layer-points', 'circle-radius', getPointRadiusExpression(mode));
                    map.setLayoutProperty('layer-points', 'circle-sort-key', mode === 'temp' ? ['get', 'sortTemp'] : ['get', 'sortPrec']);
                    map.setFilter('layer-points', mode === 'temp' ? ['!=', ['get', 'temp'], null] : ['>', ['get', 'prec'], 0]);
                } else if (mode === 'wind') {
                    map.setFilter('layer-wind', ['!=', ['get', 'wind'], null]);
                }
            }
            if(openDrawer && !isMobile()) toggleDrawer(true);
            // タブ切り替え時はフローティングを閉じる
            document.getElementById('detail-card').classList.remove('show');
            updateLegend();
        }

        async function loadWarningMode() {
            document.getElementById('status-bar').innerText = '警報データ取得中...';
            await fetchWarningData();
            applyWarningColors();
            document.getElementById('status-bar').innerText = `警報情報 更新済`;
            if (currentMode === 'warning') {
                updateRanking();
            }
        }

        function updateLegendToggle() {
            const card = document.getElementById('legend-card');
            const button = document.getElementById('legend-toggle');
            card.classList.toggle('collapsed', legendCollapsed);
            button.textContent = legendCollapsed ? '+' : '−';
            button.title = legendCollapsed ? '凡例を表示' : '凡例を非表示';
        }

        function updateLegend() {
            const container = document.getElementById('legend-content');
            const title = document.getElementById('legend-title');
            container.innerHTML = '';
            let items = [];
            
            if (currentMode === 'temp') {
                title.innerText = "気温 (℃)";
                items = [
                    { color: '#B40068', label: '35以上 (猛暑日)' }, { color: '#FF2800', label: '30〜35 (真夏日)' },
                    { color: '#FF9900', label: '25〜30 (夏日)' }, { color: '#FFEF00', label: '20〜25' },
                    { color: '#99FF00', label: '15〜20' }, { color: '#00FF00', label: '10〜15' },
                    { color: '#00FFFF', label: '5〜10' }, { color: '#0099FF', label: '0〜5' },
                    { color: '#0000FF', label: '-5〜0' }, { color: '#10008F', label: '-5未満 (冬日)' }
                ];
            } else if (currentMode === 'prec') {
                title.innerText = "降水量 (mm/h)";
                items = [
                    { color: '#B40068', label: '80以上 (猛烈な雨)' }, { color: '#FF2800', label: '50〜80 (非常に激しい)' },
                    { color: '#FF9900', label: '30〜50 (激しい雨)' }, { color: '#FFEF00', label: '20〜30 (強い雨)' },
                    { color: '#0000FF', label: '10〜20 (やや強い)' }, { color: '#0099FF', label: '1〜10' },
                    { color: '#A0D2FF', label: '0.1〜1' }
                ];
            } else if (currentMode === 'wind') {
                title.innerText = "風速 (m/s)";
                items = [...windScales];
            } else if (currentMode === 'typhoon') {
                title.innerText = "台風情報";
                items = [
                    { color: '#FF2800', label: '暴風域 (25m/s以上)' },
                    { color: 'rgba(255, 40, 0, 0.35)', label: '暴風警戒域' },
                    { color: '#FFEF00', label: '強風域 (15m/s以上)' },
                    { color: '#FFFFFF', label: '過去の経路' },
                    { color: 'rgba(255, 255, 255, 0.4)', label: '警戒領域・予報円' }
                ];
            } else if (currentMode === 'warning') {
                title.innerText = "注意報・警報";
                items = [
                    { color: '#1a1a1a', label: '特別警報', border: '1px solid #888' },
                    { color: '#AA00AA', label: '危険警報' },
                    { color: '#FF2800', label: '警報' },
                    { color: '#FFEF00', label: '注意報' },
                ];
            }
            
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'legend-item';
                const borderStyle = item.border ? item.border : '1px solid rgba(255,255,255,0.4)';
                div.innerHTML = `<div class="legend-color" style="background:${item.color}; border: ${borderStyle};"></div><span>${item.label}</span>`;
                container.appendChild(div);
            });
            
            updateLegendToggle();
            if(currentMode === 'wind') {
                container.insertAdjacentHTML('beforeend', '<div style="font-size:9px; color:var(--text-secondary); margin-top:6px; border-top:1px solid var(--border-color); padding-top:6px;">※風速が強いほど矢印の長さ・太さが拡大します。</div>');
            } else if (currentMode === 'typhoon') {
                container.insertAdjacentHTML('beforeend', '<div style="font-size:9px; color:var(--text-secondary); margin-top:6px; border-top:1px solid var(--border-color); padding-top:6px;">※白い実線は警戒領域、点線は個別の予報円<br>※赤い点は台風の中心位置</div>');
            } else if (currentMode === 'warning') {
                container.insertAdjacentHTML('beforeend', '<div style="font-size:9px; color:var(--text-secondary); margin-top:6px; border-top:1px solid var(--border-color); padding-top:6px;">※複数発表時は最上位の種別で表示<br>※危険警報は大雨・高潮・土砂・氾濫のみ</div>');
            }
        }

        function updateRanking() {
            const list = document.getElementById('ranking-list');
            list.innerHTML = '';
            
            if (currentMode === 'typhoon') {
                document.getElementById('rank-title').innerText = '現在の台風情報';
                const typhoons = typhoonGeojson.features.filter(f => f.properties.type === 'center');
                
                if (typhoons.length === 0) {
                    list.innerHTML = '<div style="padding:15px; color:var(--text-secondary); font-size:14px;">現在、発生中の台風はありません。</div>';
                } else {
                    typhoons.forEach((f) => {
                        const item = document.createElement('div');
                        item.className = 'rank-item';
                        item.innerHTML = `<div><span class="rank-name" style="color:var(--accent-color);">${f.properties.name}</span></div><span class="rank-val" style="font-size:14px;">${f.properties.pressure}hPa / ${f.properties.maxWind}m/s</span>`;
                        item.onclick = () => { map.flyTo({ center: f.geometry.coordinates, zoom: 6 }); showDetail(f.properties); };
                        list.appendChild(item);
                    });
                }
                return;
            }

            if (currentMode === 'warning') {
                document.getElementById('rank-title').innerText = '発表中の警報・注意報';
                const LEVEL_ORDER = ['tokubetsu', 'kiken', 'keiho', 'chui'];
                const LEVEL_LABEL = { tokubetsu: '特別警報', kiken: '危険警報', keiho: '警報', chui: '注意報' };

                // warningAreasGeojsonのfeatureにwarningMap情報を付けてリスト化
                const warned = (warningAreasGeojson?.features ?? [])
                    .filter(f => f.properties.regioncode && warningMap[f.properties.regioncode])
                    .map(f => ({
                        name: f.properties.name,
                        regioncode: f.properties.regioncode,
                        ...warningMap[f.properties.regioncode],
                        geometry: f.geometry
                    }))
                    .sort((a, b) => (LEVEL_PRIORITY[b.level] ?? 0) - (LEVEL_PRIORITY[a.level] ?? 0));

                if (warned.length === 0) {
                    list.innerHTML = '<div style="padding:15px; color:var(--text-secondary); font-size:14px;">現在、発表中の警報・注意報はありません。</div>';
                    return;
                }

                warned.forEach(w => {
                    const item = document.createElement('div');
                    item.className = 'warn-rank-item';
                    const badgesHtml = w.kinds.map(k =>
                        `<span class="warn-badge ${k.level}">${k.name}</span>`
                    ).join('');
                    item.innerHTML = `<div class="warn-rank-area">${w.name}</div><div class="warn-rank-badges">${badgesHtml}</div>`;
                    item.onclick = () => {
                        // ジオメトリの重心付近にフライ
                        const coords = w.geometry?.coordinates;
                        if (coords) {
                            try {
                                const center = turf.centroid({ type: 'Feature', geometry: w.geometry });
                                map.flyTo({ center: center.geometry.coordinates, zoom: 10 });
                            } catch(e) {}
                        }
                        showWarningDetail(w.name, w.kinds);
                    };
                    list.appendChild(item);
                });
                return;
            }

            let sorted = [];
            if (currentMode === 'temp') {
                document.getElementById('rank-title').innerText = '全国気温ランキング';
                sorted = geojson.features.filter(f => f.properties.temp !== null).sort((a,b) => b.properties.temp - a.properties.temp);
            } else if (currentMode === 'prec') {
                document.getElementById('rank-title').innerText = '全国降水量ランキング';
                sorted = geojson.features.filter(f => f.properties.prec > 0).sort((a,b) => b.properties.prec - a.properties.prec);
            } else {
                document.getElementById('rank-title').innerText = '全国風速ランキング';
                sorted = geojson.features.filter(f => f.properties.wind !== null).sort((a,b) => b.properties.wind - a.properties.wind);
            }
            sorted.slice(0, 50).forEach((f, i) => {
                const item = document.createElement('div');
                item.className = 'rank-item';
                const valStr = currentMode === 'temp' ? `${f.properties.temp}℃` : (currentMode === 'prec' ? `${f.properties.prec}mm` : `${f.properties.wind}m/s`);
                item.innerHTML = `<div><span class="rank-num">${i+1}</span><span class="rank-name">${f.properties.name}</span></div><span class="rank-val">${valStr}</span>`;
                item.onclick = () => { map.flyTo({ center: f.geometry.coordinates, zoom: 10 }); showDetail(f.properties); };
                list.appendChild(item);
            });
        }

        function showDetail(props) {
            // スマホ時はドロワーを閉じてからカードを表示
            if (isMobile()) toggleDrawer(false);

            document.getElementById('st-name').innerText = props.name;
            const grid = document.getElementById('detail-grid');
            grid.style.gridTemplateColumns = '';

            if (props.type === 'center' || props.type === 'forecastCircle') {
                document.getElementById('st-time').innerText = props.forecastTime ? `${props.forecastTime} 予測` : `現在位置と勢力`;
                grid.innerHTML = `
                    <div class="data-item"><span class="data-label">大きさ</span><span class="data-value" style="font-size:14px;">${props.scale}</span></div>
                    <div class="data-item"><span class="data-label">勢力</span><span class="data-value" style="font-size:14px;">${props.intensity}</span></div>
                    <div class="data-item"><span class="data-label">移動</span><span class="data-value" style="font-size:14px;">${props.speed}</span></div>
                    <div class="data-item"><span class="data-label">中心気圧</span><span class="data-value">${props.pressure}<span>hPa</span></span></div>
                    <div class="data-item"><span class="data-label">最大風速</span><span class="data-value">${props.maxWind}<span>m/s</span></span></div>
                    <div class="data-item"><span class="data-label">最大瞬間風速</span><span class="data-value">${props.maxGust}<span>m/s</span></span></div>
                `;
            } else {
                document.getElementById('st-time').innerText = `${currentObsTime} 観測`;
                const formatVal = (val) => (val == null || val === 'undefined' || val === 'null' || val === '') ? '-' : val;
                grid.innerHTML = `
                    <div class="data-item"><span class="data-label">気温</span><span class="data-value" id="val-temp">${formatVal(props.temp)}<span>℃</span></span></div>
                    <div class="data-item"><span class="data-label">降水量</span><span class="data-value" id="val-prec">${formatVal(props.prec)}<span>mm</span></span></div>
                    <div class="data-item"><span class="data-label">風速</span><span class="data-value" id="val-wind">${formatVal(props.wind)}<span>m/s</span></span></div>
                    <div class="data-item"><span class="data-label">湿度</span><span class="data-value" id="val-hum">${formatVal(props.hum)}<span>%</span></span></div>
                `;
            }

            document.getElementById('detail-card').classList.add('show');
        }

        function showWarningDetail(areaName, kinds) {
            // スマホ時はドロワーを閉じてからカードを表示
            if (isMobile()) toggleDrawer(false);

            document.getElementById('st-name').innerText = areaName;
            document.getElementById('st-time').innerText = '発表中の情報';
            const grid = document.getElementById('detail-grid');
            const LEVEL_LABEL = { tokubetsu: '特別警報', kiken: '危険警報', keiho: '警報', chui: '注意報' };
            const sorted = [...kinds].sort((a, b) =>
                (LEVEL_PRIORITY[b.level] ?? 0) - (LEVEL_PRIORITY[a.level] ?? 0)
            );
            grid.style.gridTemplateColumns = '1fr';
            grid.innerHTML = sorted.map(k => `
                <div class="data-item" style="flex-direction:row; align-items:center; gap:8px;">
                    <span class="warn-badge ${k.level}">${LEVEL_LABEL[k.level]}</span>
                    <span class="data-value" style="font-size:13px; font-weight:500;">${k.name}</span>
                </div>
            `).join('');
            document.getElementById('detail-card').classList.add('show');
        }

        document.getElementById('btn-temp').onclick    = () => handleNavClick('temp');
        document.getElementById('btn-prec').onclick    = () => handleNavClick('prec');
        document.getElementById('btn-wind').onclick    = () => handleNavClick('wind');
        document.getElementById('btn-typhoon').onclick = () => handleNavClick('typhoon');
        document.getElementById('btn-warning').onclick = () => handleNavClick('warning');
        document.getElementById('btn-rank').onclick    = () => toggleDrawer();
        document.getElementById('close-detail').onclick = () => document.getElementById('detail-card').classList.remove('show');
        document.getElementById('legend-toggle').onclick = () => {
            legendCollapsed = !legendCollapsed;
            updateLegendToggle();
        };

        // 画面サイズ・向き変更時に地図を再描画（地図の途切れ防止）
        const resizeMap = () => { if (map) setTimeout(() => map.resize(), 100); };
        window.addEventListener('resize', resizeMap);
        screen.orientation?.addEventListener('change', resizeMap);
        
        init();
    </script>
</body>
</html>

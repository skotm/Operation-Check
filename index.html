        //  自動更新：スケジューラー本体
        // ============================================================

        // 次の「intervalMin分刻みの正刻 + offsetMs」までの待機ミリ秒を計算する
        function msUntilNextTick(intervalMin, offsetMs = 0) {
            const now    = Date.now();
            const intMs  = intervalMin * 60 * 1000;
            const tickMs = Math.ceil(now / intMs) * intMs + offsetMs;
            return tickMs - now;
        }

        // ---- カウントダウンロガー ----
        // 各スケジューラーの次回発火予定時刻を記録し、毎分コンソールに残り時間を表示する
        const _nextFireAt = { radar: 0, amedas: 0, typhoon: 0, warning: 0 };
        let _countdownIntervalId = null;

        function startCountdownLogger() {
            if (_countdownIntervalId) clearInterval(_countdownIntervalId);
            _countdownIntervalId = setInterval(() => {
                const now = Date.now();
                const fmt = ms => {
                    if (ms <= 0) return '間もなく';
                    const s = Math.round(ms / 1000);
                    const m = Math.floor(s / 60);
                    return m > 0 ? `${m}分${s % 60}秒後` : `${s}秒後`;
                };
                console.log(
                    `[カウントダウン ${new Date().toLocaleTimeString('ja-JP')}] ` +
                    `レーダー: ${fmt(_nextFireAt.radar - now)} | ` +
                    `AMeDAS: ${fmt(_nextFireAt.amedas - now)} | ` +
                    `台風: ${fmt(_nextFireAt.typhoon - now)} | ` +
                    `警報: ${fmt(_nextFireAt.warning - now)}`
                );
            }, 60_000);
        }

        // ---- レーダースケジューラー ----
        // 毎時 0,5,10...55 分 + 2分10秒 に雨雲レーダーを更新
        // 気象庁のタイル配信には正刻から約2分かかるため2分遅延を設ける
        function scheduleRadar() {
            const OFFSET = 2 * 60_000 + 10_000; // 2分10秒
            const wait   = msUntilNextTick(5, OFFSET);
            const fireAt = Date.now() + wait;
            _nextFireAt.radar = fireAt;
            _schedulerRadarTimeoutId = setTimeout(async () => {
                const startTime = new Date();
                console.log(`[レーダー] 取得開始 ${startTime.toLocaleTimeString('ja-JP')}`);
                await refreshRadar();
                scheduleRadar();
            }, wait);
            console.log(`[レーダー] 次回取得: ${new Date(fireAt).toLocaleTimeString('ja-JP')} (${Math.round(wait/1000)}秒後)`);
        }

        // ---- AMeDASスケジューラー ----
        // 毎時 0,10,20,30,40,50 分 + 10秒 に latest_time.txt をポーリング開始。
        // タイムスタンプに変化があれば観測データを取得する。
        // 変化がなければ 30秒後に再ポーリングを最大10回（計5分）繰り返す。
        function scheduleAmedas() {
            const OFFSET      = 10_000; // 正刻から+10秒
            const RETRY_MS    = 30_000; // 変化なし時の再ポーリング間隔
            const MAX_RETRIES = 10;     // 最大再試行回数

            const wait   = msUntilNextTick(10, OFFSET);
            const fireAt = Date.now() + wait;
            _nextFireAt.amedas = fireAt;

            _schedulerAmedasTimeoutId = setTimeout(async () => {
                console.log(`[AMeDAS] ポーリング開始 ${new Date().toLocaleTimeString('ja-JP')}`);
                let retries = 0;

                const poll = async () => {
                    try {
                        const url     = `${JMA_BASE}/data/latest_time.txt`;
                        const timeRes = await fetch(url, { cache: 'no-store' });
                        if (!timeRes.ok) {
                            console.warn(`[AMeDAS] latest_time.txt 取得失敗 HTTP ${timeRes.status}`);
                            scheduleAmedas();
                            return;
                        }
                        const datetime = (await timeRes.text()).trim();
                        console.log(
                            `[AMeDAS] latest_time.txt="${datetime}" | 前回="${_amedasLastTimestamp}" | ` +
                            `試行${retries + 1}/${MAX_RETRIES}回目`
                        );

                        if (datetime === _amedasLastTimestamp) {
                            retries++;
                            if (retries >= MAX_RETRIES) {
                                console.warn(`[AMeDAS] ${MAX_RETRIES}回ポーリングしても変化なし → 次サイクルへ`);
                                scheduleAmedas();
                                return;
                            }
                            console.log(`[AMeDAS] 変化なし → ${RETRY_MS / 1000}秒後に再ポーリング (${retries}/${MAX_RETRIES})`);
                            _schedulerAmedasTimeoutId = setTimeout(poll, RETRY_MS);
                            return;
                        }

                        // 変化あり → 観測データ取得
                        console.log(`[AMeDAS] タイムスタンプ変化: "${_amedasLastTimestamp}" → "${datetime}"`);
                        _amedasLastTimestamp = datetime;

                        const mapTime  = datetime.replace(/[-T:]/g, '').substring(0, 14);
                        const dataUrl  = `${JMA_BASE}/data/map/${mapTime}.json`;
                        console.log(`[AMeDAS] 観測データ取得: ${dataUrl}`);
                        const t0       = performance.now();
                        const dataRes  = await fetch(dataUrl, { cache: 'no-store' });
                        if (!dataRes.ok) {
                            console.warn(`[AMeDAS] 観測データ取得失敗 HTTP ${dataRes.status}`);
                            scheduleAmedas();
                            return;
                        }
                        const amedasData   = await dataRes.json();
                        const elapsed      = Math.round(performance.now() - t0);
                        const stationCount = Object.keys(amedasData).length;
                        console.log(`[AMeDAS] 取得完了: ${mapTime.substring(8,10)}:${mapTime.substring(10,12)} 観測 / ${stationCount}地点 / ${elapsed}ms`);

                        geojson.features = geojson.features.map(f => {
                            const id  = f.properties.id;
                            const obs = amedasData[id];
                            if (!obs) return f;
                            const temp    = obs.temp            !== undefined ? obs.temp[0]            : null;
                            const prec    = obs.precipitation1h !== undefined ? obs.precipitation1h[0] : null;
                            const windSpd = obs.wind            !== undefined ? obs.wind[0]            : null;
                            const windDir = obs.windDirection   !== undefined ? obs.windDirection[0]   : 0;
                            const hum     = obs.humidity        !== undefined ? obs.humidity[0]        : null;
                            return {
                                ...f,
                                properties: {
                                    ...f.properties,
                                    temp, prec, wind: windSpd, windDir, hum,
                                    sortTemp:  temp    !== null ? temp           : -100,
                                    sortPrec:  prec    !== null ? prec           : -1,
                                    sortWind:  windSpd !== null ? windSpd        : -1,
                                    sizeTemp:  temp    !== null ? Math.abs(temp) : 0,
                                    sizePrec:  prec    !== null ? prec           : 0,
                                    tempColor: getTempColor(temp),
                                    precColor: getPrecColor(prec),
                                }
                            };
                        });

                        if (map.getSource('amedas')) map.getSource('amedas').setData(geojson);

                        currentObsTime = `${mapTime.substring(8,10)}:${mapTime.substring(10,12)}`;
                        if (currentMode === 'temp' || currentMode === 'wind' ||
                            (currentMode === 'prec' && precSubMode === 'amedas')) {
                            document.getElementById('status-bar').innerText = `LIVE: ${currentObsTime} 観測`;
                        }
                        // キキクルも同じ10分タイミングで更新
                        refreshRisk().catch(e => console.warn('[キキクル] 更新失敗:', e));

                        scheduleAmedas();

                    } catch (e) {
                        console.warn('[AMeDAS/キキクル] ポーリング中にエラー:', e);
                        scheduleAmedas();
                    }
                };

                await poll();
            }, wait);

            console.log(`[AMeDAS] 次回ポーリング開始: ${new Date(fireAt).toLocaleTimeString('ja-JP')} (${Math.round(wait/1000)}秒後)`);
        }

        // ---- 台風スケジューラー ----
        // 毎時 0 分 + 10秒 に台風情報を更新
        function scheduleTyphoon() {
            const wait   = msUntilNextTick(60, 10_000);
            const fireAt = Date.now() + wait;
            _nextFireAt.typhoon = fireAt;
            _schedulerTyphoonTimeoutId = setTimeout(async () => {
                console.log(`[台風] 取得開始 ${new Date().toLocaleTimeString('ja-JP')}`);
                await refreshTyphoon();
                scheduleTyphoon();
            }, wait);
            console.log(`[台風] 次回取得: ${new Date(fireAt).toLocaleTimeString('ja-JP')} (${Math.round(wait/1000)}秒後)`);
        }

        // ---- 警報スケジューラー ----
        // 起動から5分おきに警報・洪水情報を更新
        function scheduleWarning() {
            const INTERVAL = 5 * 60_000;
            const fireAt   = Date.now() + INTERVAL;
            _nextFireAt.warning = fireAt;
            _schedulerWarningIntervalId = setInterval(async () => {
                _nextFireAt.warning = Date.now() + INTERVAL;
                console.log(`[警報] 取得開始 ${new Date().toLocaleTimeString('ja-JP')}`);
                await refreshWarning();
            }, INTERVAL);
            console.log(`[警報] 次回取得: ${new Date(fireAt).toLocaleTimeString('ja-JP')} (${Math.round(INTERVAL/1000)}秒後)`);
        }

        // ---- 全スケジューラー起動 ----
        function startAllSchedulers() {
            scheduleRadar();
            scheduleAmedas();
            scheduleTyphoon();
            scheduleWarning();
            startCountdownLogger();
            console.log('[スケジューラー] 全スケジューラー起動完了');
        }

        function toggleDebugPanel() {
            document.getElementById('debug-panel').classList.toggle('visible');
        }

        // ナビタブ3連打検出
        let _navTapTimes = [];
        function handleNavClick(mode) {
            const now = Date.now();
            _navTapTimes.push(now);
            _navTapTimes = _navTapTimes.filter(t => now - t < 800);
            if (_navTapTimes.length >= 3) {
                _navTapTimes = [];
                toggleDebugPanel();
                return;
            }
            const drawer = document.getElementById('drawer-panel');
            const isOpen = drawer.classList.contains('show');

            if (isMobile()) {
                if (currentMode === mode) {
                    // 同じタブ：開閉トグル
                    toggleDrawer(!isOpen);
                } else {
                    // 別タブ：モード切替のみ、ドロワーは開かない
                    setMode(mode, false);
                }
            } else {
                // PC：従来通り（同じタブで閉じる、別タブで開く）
                if (currentMode === mode && isOpen) {
                    toggleDrawer(false);
                } else {
                    setMode(mode, true);
                }
            }
        }

        function toggleDrawer(forceOpen = null) {
            const drawer = document.getElementById('drawer-panel');
            const targetState = (forceOpen !== null) ? forceOpen : !drawer.classList.contains('show');
            if (targetState) {
                drawer.classList.add('show');
                document.body.classList.add('drawer-open');
                document.getElementById('btn-rank').classList.add('active');
                updateRanking();
            } else {
                drawer.classList.remove('show');
                document.body.classList.remove('drawer-open');
                document.getElementById('btn-rank').classList.remove('active');
            }
        }

        function setMode(mode, openDrawer = true) {
            currentMode = mode;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(mode !== 'rank') document.getElementById(`btn-${mode}`).classList.add('active');

            // タブ切り替え時にステータスバーをモードに応じた内容に更新
            const statusEl = document.getElementById('status-bar');
            if (mode === 'temp' || mode === 'wind') {
                statusEl.innerText = currentObsTime !== '--:--' ? `LIVE: ${currentObsTime} 観測` : 'AMeDASデータ読込中...';
            } else if (mode === 'typhoon') {
                statusEl.innerText = '台風情報';
            } else if (mode === 'warning') {
                statusEl.innerText = warningLoaded ? '警報情報' : '警報データ取得中...';
            }
            // prec(雨雲・降水)モードは setPrecSubMode 内で設定するためここでは設定しない

            // 降水サブモード切り替えボタンの表示制御
            const precToggle = document.getElementById('prec-sub-toggle');
            if (mode === 'prec') {
                precToggle.classList.add('visible');
            } else {
                precToggle.classList.remove('visible');
                // precタブを離れたらレーダーを非表示・再生停止
                document.getElementById('radar-slider-bar').classList.remove('visible');
                stopRadarPlay();
                if (map.getLayer(`${RADAR_LYR}-z2`)) {
                    RADAR_ZOOM_LEVELS.forEach(({ z }) => {
                        const lyrId = `${RADAR_LYR}-z${z}`;
                        if (map.getLayer(lyrId)) map.setLayoutProperty(lyrId, 'visibility', 'none');
                    });
                }
                // 境界線オーバーレイも非表示
                if (map.getLayer('pref-line-overlay')) {
                    map.setLayoutProperty('world-line-overlay', 'visibility', 'none');
                    map.setLayoutProperty('pref-line-overlay',  'visibility', 'none');
                }
            }
            
            if (map.getLayer('layer-points')) {
                // precモードではサブモードで判断するため、ここでは一旦noneにしてサブモード側で制御
                const pointsVis  = (mode === 'temp') ? 'visible'
                                 : (mode === 'prec' && precSubMode === 'amedas') ? 'visible'
                                 : 'none';
                const windVis    = (mode === 'wind') ? 'visible' : 'none';
                const typhoonVis = (mode === 'typhoon') ? 'visible' : 'none';
                const warningVis = (mode === 'warning') ? 'visible' : 'none';

                map.setLayoutProperty('layer-points', 'visibility', pointsVis);
                map.setLayoutProperty('layer-wind',   'visibility', windVis);

                map.setLayoutProperty('layer-typhoon-area',                'visibility', typhoonVis);
                map.setLayoutProperty('layer-typhoon-past-track',          'visibility', typhoonVis);
                map.setLayoutProperty('layer-typhoon-track',               'visibility', typhoonVis);
                map.setLayoutProperty('layer-typhoon-forecast-fill',       'visibility', typhoonVis);
                map.setLayoutProperty('layer-typhoon-storm-warning-fill',  'visibility', typhoonVis);
                map.setLayoutProperty('layer-typhoon-storm-warning-line',  'visibility', typhoonVis);
                map.setLayoutProperty('layer-typhoon-forecast-area-line',  'visibility', typhoonVis);
                map.setLayoutProperty('layer-typhoon-forecast-circle-line','visibility', typhoonVis);
                map.setLayoutProperty('layer-typhoon-center',              'visibility', typhoonVis);
                updateForecastTimeMarkers(mode === 'typhoon');

                if (map.getLayer('layer-warning-fill')) {
                    map.setLayoutProperty('layer-warning-fill', 'visibility', warningVis);
                    map.setLayoutProperty('layer-warning-line', 'visibility', warningVis);
                }

                if (mode === 'temp') {
                    map.setPaintProperty('layer-points', 'circle-color', ['get', 'tempColor']);
                    map.setPaintProperty('layer-points', 'circle-radius', getPointRadiusExpression('temp'));
                    map.setLayoutProperty('layer-points', 'circle-sort-key', ['get', 'sortTemp']);
                    map.setFilter('layer-points', ['!=', ['get', 'temp'], null]);
                } else if (mode === 'wind') {
                    map.setFilter('layer-wind', ['!=', ['get', 'wind'], null]);
                }
            }

            // 警報サブトグルの表示・非表示（layer-points の存在に依存しない）
            const warningToggleEl = document.getElementById('warning-sub-toggle');
            if (mode === 'warning') {
                warningToggleEl.classList.add('visible');
            } else {
                warningToggleEl.classList.remove('visible');
                document.getElementById('risk-layer-toggle').classList.remove('visible');
                document.getElementById('risk-slider-bar').classList.remove('visible');
                stopRiskPlay();
                hideAllRiskLayers();
                hideRiverLayers();
                if (map.getLayer('world-line-overlay')) map.setLayoutProperty('world-line-overlay', 'visibility', 'none');
                if (map.getLayer('pref-line-overlay'))  map.setLayoutProperty('pref-line-overlay',  'visibility', 'none');
            }

            if (mode === 'prec') {
                if(openDrawer && !isMobile()) toggleDrawer(true);
                document.getElementById('detail-card').classList.remove('show');
                setPrecSubMode(precSubMode);
                return;
            }

            if (mode === 'warning') {
                if (!warningLoaded) {
                    loadWarningMode();
                } else {
                    document.getElementById('status-bar').innerText = '警報情報';
                    setWarningSubMode(warningSubMode);
                    return;
                }
            }
            if(openDrawer && !isMobile()) toggleDrawer(true);
            // タブ切り替え時はフローティングを閉じる
            document.getElementById('detail-card').classList.remove('show');
            updateLegend();
        }

        // キキクル タイルURL生成（単一ソース、{z}/{x}/{y} テンプレート）
        function riskTileUrl(basetime, validtime, type, zoomLevel) {
            const bt = basetime || 'none';
            const vt = validtime || 'none';
            const z  = zoomLevel !== undefined ? zoomLevel : '{z}';
            return `https://www.jma.go.jp/bosai/jmatile/data/risk/${bt}/none/${vt}/surf/${type}/${z}/{x}/{y}.png`;
        }
        function riskVectorUrl(basetime, validtime, type) {
            const bt = basetime || 'none';
            const vt = validtime || 'none';
            return `https://www.jma.go.jp/bosai/jmatile/data/risk/${bt}/none/${vt}/surf/${type}/{z}/{x}/{y}.pbf`;
        }

        // ===== タイプ別 targetTimes エンドポイント =====
        // 調査結果: JMAのXML仕様で「targetTimes.json · land」と明示されており
        // targetTimes.json は土砂(land)専用。浸水(inund)は
        // ナウキャスト系と同じ targetTimes_N1.json を使用する。
        // 洪水(flood)は河川ラインベクターのみで、land と同じ更新サイクルのため targetTimes.json を使用。
        const RISK_TARGET_TIMES = {
            land:  'https://www.jma.go.jp/bosai/jmatile/data/risk/targetTimes.json',
            inund: 'https://www.jma.go.jp/bosai/jmatile/data/risk/targetTimes_N1.json',
            flood: 'https://www.jma.go.jp/bosai/jmatile/data/risk/targetTimes.json',  // landと同サイクル
            rain:  'https://www.jma.go.jp/bosai/jmatile/data/risk/targetTimes_N1.json',
        };
        function riskTargetTimesUrl() {
            return RISK_TARGET_TIMES[riskLayer] || RISK_TARGET_TIMES.land;
        }

        async function loadRiskFrames() {
            let url = riskTargetTimesUrl();
            let res = await fetch(url, { cache: 'no-store' });

            // N1が存在しない場合はデフォルト(land用)にフォールバック
            if (!res.ok && url !== RISK_TARGET_TIMES.land) {
                console.warn(`[キキクル] ${url} → HTTP ${res.status}。targetTimes.json にフォールバック`);
                url = RISK_TARGET_TIMES.land;
                res = await fetch(url, { cache: 'no-store' });
            }
            if (!res.ok) throw new Error(`risk targetTimes ${res.status}`);

            const times = await res.json();
            // レーダーと同様に validtime 昇順でソートし、riskIndex=0 が最古・末尾が最新になるよう統一
            riskFrames = times
                .slice()
                .sort((a, b) => a.validtime.localeCompare(b.validtime))
                .map(t => ({ basetime: t.basetime, validtime: t.validtime }));
            const slider = document.getElementById('risk-slider');
            slider.max = riskFrames.length - 1;
            if (!_riskInitialized) {
                riskIndex = riskFrames.length - 1; // 最新フレームを初期表示
                slider.value = riskIndex;
                _riskInitialized = true;
            } else {
                riskIndex = Math.min(riskIndex, riskFrames.length - 1);
                slider.value = riskIndex;
            }
            console.log(`[キキクル] フレーム取得(${url.split('/').pop()}) ${riskFrames.length}件 最新:${riskFrames.at(-1)?.validtime}`);
            // レイヤー初期化済みの場合のみ updateRiskFrame を呼ぶ
            // 未初期化時は initRiskLayers の呼び出し元が updateRiskFrame を担う
            if (riskLoaded) updateRiskFrame();
        }

        function updateRiskFrame() {
            if (!riskFrames.length || !riskLoaded) return;
            // riskIndex は昇順配列への直接インデックス（0=最古, max=最新）
            // 旧実装の [max - riskIndex] 反転を廃止し、レーダーと同じ設計に統一
            const frame  = riskFrames[riskIndex];
            const onRisk = currentMode === 'warning' && warningSubMode === 'risk';

            // 表示するラスタータイルタイプを決定
            // 洪水(flood)は河川ベクターラインが本体のためラスタータイルなし
            // rain(大雨)はinundラスター + 洪水ライン の組み合わせ
            const activeTypes = riskLayer === 'rain'  ? ['inund']
                              : riskLayer === 'flood' ? []         // flood はラスターなし
                              : riskLayer === 'inund' ? ['inund']
                              : ['land'];
            const hiddenTypes = ['land', 'inund', 'flood'].filter(t => !activeTypes.includes(t));

            RADAR_ZOOM_LEVELS.forEach(({ z, minzoom, maxzoom }) => {
                // アクティブなタイプを追加
                activeTypes.forEach(type => {
                    const srcId = `${RISK_SRC_PREFIX}-${type}-z${z}`;
                    const lyrId = `${RISK_LYR_PREFIX}-${type}-z${z}`;
                    const newUrl = riskTileUrl(frame.basetime, frame.validtime, type, z);

                    if (map.getLayer(lyrId)) map.removeLayer(lyrId);
                    if (map.getSource(srcId)) map.removeSource(srcId);

                    console.debug(`[キキクル] タイルURL: type=${type} z=${z} bt=${frame.basetime} vt=${frame.validtime}`);
                    try {
                        map.addSource(srcId, {
                            type: 'raster',
                            tiles: [newUrl],
                            tileSize: 256,
                            minzoom: 0,
                            maxzoom: z,
                            bounds: [118, 20, 150, 48]
                        });
                        map.addLayer({
                            id: lyrId, type: 'raster', source: srcId,
                            minzoom, maxzoom,
                            layout: { visibility: onRisk ? 'visible' : 'none' },
                            // 大雨モードでは inund と flood を重ねるため opacity を下げて両方見えるようにする
                            paint: { 'raster-opacity': riskLayer === 'rain' ? 0.7 : 0.8 }
                        }, 'pref-line-overlay');
                    } catch (e) {
                        console.error(`[キキクル] addLayer失敗 lyrId=${lyrId}:`, e.message);
                    }
                });

                // 非アクティブなタイプを削除
                hiddenTypes.forEach(type => {
                    const oSrcId = `${RISK_SRC_PREFIX}-${type}-z${z}`;
                    const oLyrId = `${RISK_LYR_PREFIX}-${type}-z${z}`;
                    if (map.getLayer(oLyrId)) map.removeLayer(oLyrId);
                    if (map.getSource(oSrcId)) map.removeSource(oSrcId);
                });
            });

            // 洪水/大雨モードでは河川ラインを表示
            // flood_riskline は /data/map/none/none/none/ の静的タイルを使用
            // （JMAがサーバー側で随時更新しているため常に最新の危険度が反映される）
            // ※ /data/risk/{bt}/{vt}/ への動的URLは404のため使用不可
            const showRiver = onRisk && (riskLayer === 'flood' || riskLayer === 'rain');
            if (showRiver) {
                showRiverLayers();
            } else {
                hideRiverLayers();
            }

            const label = nowcDateLabel(frame.validtime);
            document.getElementById('risk-time-label').innerText = label;
            document.getElementById('risk-slider').value = riskIndex;
        }

        function hideAllRiskLayers() {
            ['land', 'inund', 'flood'].forEach(type => {
                RADAR_ZOOM_LEVELS.forEach(({ z }) => {
                    const lyrId = `${RISK_LYR_PREFIX}-${type}-z${z}`;
                    const srcId = `${RISK_SRC_PREFIX}-${type}-z${z}`;
                    if (map.getLayer(lyrId)) map.removeLayer(lyrId);
                    if (map.getSource(srcId)) map.removeSource(srcId);
                });
            });
        }
        function hideRiverLayers() {
            ['layer-river-riskline', 'layer-river-name'].forEach(id => {
                if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', 'none');
            });
        }
        function showRiverLayers() {
            if (map.getLayer('layer-river-riskline')) map.setLayoutProperty('layer-river-riskline', 'visibility', 'visible');
            if (map.getLayer('layer-river-name'))     map.setLayoutProperty('layer-river-name',     'visibility', 'visible');
            // 初回表示時のみ診断を実行
            if (!window._riverDiagDone) {
                window._riverDiagDone = true;
                debugRiverLayer();
            }
        }

        // ===== 河川レイヤー診断（問題切り分け用）=====
        async function debugRiverLayer() {
            console.group('[河川診断] flood_riskline タイル診断開始');

            // 1. XHRでタイル直接アクセス（fetchオーバーライドをバイパス）
            const testUrl = 'https://www.jma.go.jp/bosai/jmatile/data/map/none/none/none/surf/flood_riskline/8/227/100.pbf';
            await new Promise(resolve => {
                const xhr = new XMLHttpRequest();
                xhr.open('GET', testUrl, true);
                xhr.responseType = 'arraybuffer';
                xhr.onload = () => {
                    if (xhr.status === 200) {
                        console.log(`[1] ✅ タイル取得成功 HTTP200 (${xhr.response.byteLength}バイト) → URLは正常`);
                        const corsHeader = xhr.getResponseHeader('Access-Control-Allow-Origin');
                        console.log(`[1] CORS header: ${corsHeader || '(なし)'}`);
                    } else {
                        console.warn(`[1] ❌ タイルHTTP${xhr.status} → URLが誤りか存在しない`);
                    }
                    resolve();
                };
                xhr.onerror = () => {
                    console.error('[1] ❌ XHR失敗 → CORSブロック または ネットワークエラー');
                    console.warn('[1] → JMAサーバーがPBFタイルをCORSで拒否している可能性が高い');
                    resolve();
                };
                xhr.send();
            });

            // 2. source-layer名の探索（タイル読み込み後）
            await new Promise(r => setTimeout(r, 2500));
            console.log('[2] source-layer名を探索中...');
            const candidates = ['flood_riskline', 'river', 'riskline', 'flood', 'default', 'layer', 'floodRiskLine', 'flood-riskline'];
            let found = false;
            for (const sl of candidates) {
                try {
                    const features = map.querySourceFeatures(RIVER_SRC, { sourceLayer: sl });
                    if (features.length > 0) {
                        console.log(`[2] ✅ 正しいsource-layer: "${sl}" (${features.length}件)`);
                        console.log('[2] サンプルプロパティ:', JSON.stringify(features[0].properties));
                        found = true;
                        break;
                    } else {
                        console.log(`[2] source-layer="${sl}": 0件`);
                    }
                } catch (e) { /* ignore */ }
            }
            if (!found) {
                console.warn('[2] ❌ いずれのsource-layer名でもフィーチャが見つかりません');
                console.warn('[2] → タイル自体が404/CORS、またはズームレベル7未満の可能性');
                console.warn('[2] → 現在のズームレベル:', map.getZoom().toFixed(1));
            }
            console.groupEnd();
        }

        function riskTogglePlay() {
            if (riskTimer) { stopRiskPlay(); return; }
            riskTimer = setInterval(() => {
                riskIndex = (riskIndex + 1) % riskFrames.length;
                updateRiskFrame();
            }, 600);
            document.getElementById('risk-play-btn').classList.add('playing');
            document.getElementById('risk-play-btn').innerHTML = '&#9646;&#9646;';
        }
        function stopRiskPlay() {
            if (riskTimer) { clearInterval(riskTimer); riskTimer = null; }
            document.getElementById('risk-play-btn').classList.remove('playing');
            document.getElementById('risk-play-btn').innerHTML = '&#9654;';
        }
        function riskStep(dir) {
            stopRiskPlay();
            riskIndex = Math.max(0, Math.min(riskFrames.length - 1, riskIndex + dir));
            updateRiskFrame();
        }
        function riskSeek(idx) { stopRiskPlay(); riskIndex = idx; updateRiskFrame(); }
        function riskGoLatest() { stopRiskPlay(); riskIndex = riskFrames.length - 1; updateRiskFrame(); }

        async function initRiskLayers(frame) {
            if (riskLoaded) return;
            const attr = "<a href='https://www.jma.go.jp/bosai/risk/' target='_blank'>気象庁 危険度分布（キキクル）</a>";

            // キキクルラスタータイルは updateRiskFrame が削除→再追加で管理するため
            // ここでは河川レイヤーのみ初期化する

            // 水害リスクライン
            // タイルパスは /bosai/jmatile/data/map/... （/risk/ ではなく /map/ が正しい）
            // source-layer: flood_riskline, level プロパティ: -3(データなし), -2(水位低下), 2〜5
            // level 1 は存在しない。平常時はデフォルト色（#dddddd）
            if (!map.getSource(RIVER_SRC)) {
                map.addSource(RIVER_SRC, {
                    type: 'vector',
                    tiles: ['https://www.jma.go.jp/bosai/jmatile/data/map/none/none/none/surf/flood_riskline/{z}/{x}/{y}.pbf'],
                    minzoom: 4, maxzoom: 14, attribution: attr
                });
                map.addLayer({
                    id: 'layer-river-riskline', type: 'line',
                    source: RIVER_SRC, 'source-layer': 'flood_riskline',
                    minzoom: 7,
                    layout: { visibility: 'none', 'line-cap': 'butt', 'line-join': 'round' },
                    paint: {
                        'line-color': [
                            'match', ['get', 'level'],
                            5,  '#0c000c',  // 災害切迫（黒）
                            4,  '#aa00aa',  // 極めて危険（紫）
                            3,  '#ff2800',  // 非常に危険（赤）
                            2,  '#f2e700',  // 警戒（黄）
                            -2, '#4dc3ff',  // 水位低下（シアン・平常時と同色）
                            -3, '#1a1a2a',  // データなし（ほぼ不可視）
                            '#4dc3ff'       // デフォルト（平常時）= JMA公式シアン
                            // 静的タイルは level プロパティを持たない河川が多いため
                            // デフォルト色がメインの表示色になる
                        ],
                        'line-width': ['interpolate', ['linear'], ['zoom'], 7, 1.2, 11, 2.5, 14, 4]
                    }
                }, 'pref-line-overlay');
                console.log('[河川] リスクラインレイヤー追加 (map path)');
            }

            // 河川名ラベル
            if (!map.getSource(RIVER_NAME_SRC)) {
                map.addSource(RIVER_NAME_SRC, {
                    type: 'vector',
                    tiles: ['https://www.jma.go.jp/bosai/jmatile/data/map/none/none/none/surf/flood_name/{z}/{x}/{y}.pbf'],
                    minzoom: 4, maxzoom: 14
                });
                map.addLayer({
                    id: 'layer-river-name', type: 'symbol',
                    source: RIVER_NAME_SRC, 'source-layer': 'flood_name',
                    minzoom: 11,
                    layout: {
                        visibility: 'none',
                        'text-field': ['get', 'riverNameJP'],
                        'text-size': ['interpolate', ['linear'], ['zoom'], 11, 11, 14, 15],
                        'symbol-placement': 'line', 'text-max-angle': 30,
                        'text-padding': 10, 'text-font': ['Noto Sans Regular']
                    },
                    paint: { 'text-color': '#3cffff', 'text-halo-color': '#333333', 'text-halo-width': 2 }
                });
            }

            riskLoaded = true;
            console.log('[キキクル] レイヤー初期化完了');
        }

        async function refreshRisk() {
            try {
                const t0 = performance.now();
                await loadRiskFrames();
                const elapsed = Math.round(performance.now() - t0);
                // 水害リスクライン（flood_riskline）は静的タイル（/data/map/none/none/none/）のため
                // refreshRisk でのタイムスタンプ付き setTiles は不要（initRiskLayers の初期値を維持）
                console.log(`[キキクル] 更新完了 ${elapsed}ms | ${riskFrames.length}フレーム`);
            } catch (e) {
                console.warn('[キキクル] 更新失敗:', e);
            }
        }

        function setWarningSubMode(mode) {
            warningSubMode = mode;
            ['warning', 'risk', 'river'].forEach(m => {
                document.getElementById(`btn-sub-${m}`).classList.toggle('active', m === mode);
            });

            const riskLayerToggle = document.getElementById('risk-layer-toggle');
            const riskSliderBar   = document.getElementById('risk-slider-bar');
            if (mode === 'risk') {
                // riskLoaded 済みの場合のみ即座に表示（未ロード時は init 完了後に表示）
                if (riskLoaded) {
                    riskLayerToggle.classList.add('visible');
                    riskSliderBar.classList.add('visible');
                }
            } else {
                riskLayerToggle.classList.remove('visible');
                riskSliderBar.classList.remove('visible');
                stopRiskPlay();
            }

            const warningVis = mode === 'warning' ? 'visible' : 'none';
            ['layer-warning-fill', 'layer-warning-line'].forEach(id => {
                if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', warningVis);
            });

            hideAllRiskLayers();
            hideRiverLayers();

            const showOverlay = mode !== 'warning';
            if (map.getLayer('pref-line-overlay')) {
                map.setLayoutProperty('world-line-overlay', 'visibility', showOverlay ? 'visible' : 'none');
                map.setLayoutProperty('pref-line-overlay',  'visibility', showOverlay ? 'visible' : 'none');
            }

            if (mode === 'risk') {
                if (!riskLoaded) {
                    // 初期化完了後にUIを表示することで、riskLoaded=false の間に
                    // レイヤーボタンが押される競合状態を防ぐ
                    riskLayerToggle.classList.remove('visible');
                    riskSliderBar.classList.remove('visible');
                    loadRiskFrames()
                        .then(async () => {
                            await initRiskLayers(riskFrames[riskFrames.length - 1]);
                            riskLayerToggle.classList.add('visible');
                            riskSliderBar.classList.add('visible');
                            updateRiskFrame();
                        })
                        .catch(e => console.error('[キキクル] 初期化失敗:', e));
                } else {
                    updateRiskFrame();
                }
            } else if (mode === 'river') {
                if (!riskLoaded) {
                    loadRiskFrames()
                        .then(async () => {
                            await initRiskLayers(riskFrames[riskFrames.length - 1]);
                            showRiverLayers();
                        })
                        .catch(e => console.error('[河川] 初期化失敗:', e));
                } else {
                    showRiverLayers();
                }
            } else {
                updateRanking();
            }
            updateLegend();
        }

        function setRiskLayer(layer) {
            const prevLayer = riskLayer;
            riskLayer = layer;
            ['land', 'inund', 'flood', 'rain'].forEach(l => {
                document.getElementById(`btn-risk-${l}`).classList.toggle('active', l === layer);
            });
            hideAllRiskLayers();
            // 河川レイヤーを一旦非表示（updateRiskFrame内で洪水モード時のみ表示）
            if (map.getLayer('layer-river-riskline')) map.setLayoutProperty('layer-river-riskline', 'visibility', 'none');
            if (map.getLayer('layer-river-name'))     map.setLayoutProperty('layer-river-name',     'visibility', 'none');

            // targetTimesのURLがタイプグループ間で変わる場合はフレームを再ロードする
            // グループA (targetTimes.json):  land, flood
            // グループB (targetTimes_N1.json): inund, rain
            const isN1 = l => ['inund', 'rain'].includes(l);
            if (isN1(prevLayer) !== isN1(layer)) {
                _riskInitialized = false; // スライダーを新しいフレーム数で再初期化
                loadRiskFrames().catch(e => console.error('[キキクル] フレーム切り替え失敗:', e));
            } else {
                updateRiskFrame();
            }
            updateLegend();
        }

        function updateRanking() {
            const list = document.getElementById('ranking-list');
            list.innerHTML = '';
            
            if (currentMode === 'typhoon') {
                document.getElementById('rank-title').innerText = '現在の台風情報';
                const typhoons = typhoonGeojson.features.filter(f => f.properties.type === 'center');
                
                if (typhoons.length === 0) {
                    list.innerHTML = '<div style="padding:15px; color:var(--text-secondary); font-size:14px;">現在、発生中の台風はありません。</div>';
                } else {
                    typhoons.forEach((f) => {
                        const item = document.createElement('div');
                        item.className = 'rank-item';
                        item.innerHTML = `<div><span class="rank-name" style="color:var(--accent-color);">${f.properties.name}</span></div><span class="rank-val" style="font-size:14px;">${f.properties.pressure}hPa / ${f.properties.maxWind}m/s</span>`;
                        item.onclick = () => { map.flyTo({ center: f.geometry.coordinates, zoom: 6 }); showDetail(f.properties); };
                        list.appendChild(item);
                    });
                }
                return;
            }

            if (currentMode === 'warning') {
                document.getElementById('rank-title').innerText = '発表中の警報・注意報';
                const LEVEL_ORDER = ['tokubetsu', 'kiken', 'keiho', 'chui'];
                const LEVEL_LABEL = { tokubetsu: '特別警報', kiken: '危険警報', keiho: '警報', chui: '注意報' };

                // warningAreasGeojsonのfeatureにwarningMap情報を付けてリスト化
                const warned = (warningAreasGeojson?.features ?? [])
                    .filter(f => f.properties.regioncode && warningMap[f.properties.regioncode])
                    .map(f => ({
                        name: f.properties.name,
                        regioncode: f.properties.regioncode,
                        ...warningMap[f.properties.regioncode],
                        geometry: f.geometry
                    }))
                    .sort((a, b) => (LEVEL_PRIORITY[b.level] ?? 0) - (LEVEL_PRIORITY[a.level] ?? 0));

                if (warned.length === 0) {
                    list.innerHTML = '<div style="padding:15px; color:var(--text-secondary); font-size:14px;">現在、発表中の警報・注意報はありません。</div>';
                    return;
                }

                warned.forEach(w => {
                    const item = document.createElement('div');
                    item.className = 'warn-rank-item';
                    const badgesHtml = w.kinds.map(k =>
                        `<span class="warn-badge ${k.level}">${k.name}</span>`
                    ).join('');
                    item.innerHTML = `<div class="warn-rank-area">${w.name}</div><div class="warn-rank-badges">${badgesHtml}</div>`;
                    item.onclick = () => {
                        // ジオメトリの重心付近にフライ
                        const coords = w.geometry?.coordinates;
                        if (coords) {
                            try {
                                const center = turf.centroid({ type: 'Feature', geometry: w.geometry });
                                map.flyTo({ center: center.geometry.coordinates, zoom: 10 });
                            } catch(e) {}
                        }
                        showWarningDetail(w.name, w.kinds);
                    };
                    list.appendChild(item);
                });
                return;
            }

            let sorted = [];
            if (currentMode === 'temp') {
                document.getElementById('rank-title').innerText = '全国気温ランキング';
                sorted = geojson.features.filter(f => f.properties.temp !== null).sort((a,b) => b.properties.temp - a.properties.temp);
            } else if (currentMode === 'prec') {
                document.getElementById('rank-title').innerText = '全国降水量ランキング';
                if (precSubMode === 'radar') {
                    list.innerHTML = '<div style="padding:15px; color:var(--text-secondary); font-size:14px;">雨雲レーダー表示中<br>「観測値」に切り替えると地点ランキングが表示されます。</div>';
                    return;
                }
                sorted = geojson.features.filter(f => f.properties.prec > 0).sort((a,b) => b.properties.prec - a.properties.prec);
            } else {
                document.getElementById('rank-title').innerText = '全国風速ランキング';
                sorted = geojson.features.filter(f => f.properties.wind !== null).sort((a,b) => b.properties.wind - a.properties.wind);
            }
            sorted.slice(0, 50).forEach((f, i) => {
                const item = document.createElement('div');
                item.className = 'rank-item';
                const valStr = currentMode === 'temp' ? `${f.properties.temp}℃` : (currentMode === 'prec' ? `${f.properties.prec}mm` : `${f.properties.wind}m/s`);
                item.innerHTML = `<div><span class="rank-num">${i+1}</span><span class="rank-name">${f.properties.name}</span></div><span class="rank-val">${valStr}</span>`;
                item.onclick = () => { map.flyTo({ center: f.geometry.coordinates, zoom: 10 }); showDetail(f.properties); };
                list.appendChild(item);
            });
        }

        function showDetail(props) {
            // スマホ時はドロワーを閉じてからカードを表示
            if (isMobile()) toggleDrawer(false);

            document.getElementById('st-name').innerText = props.name;
            const grid = document.getElementById('detail-grid');
            grid.style.gridTemplateColumns = '';

            if (props.type === 'center' || props.type === 'forecastCircle') {
                document.getElementById('st-time').innerText = props.forecastTime ? `${props.forecastTime} 予測` : `現在位置と勢力`;
                grid.innerHTML = `
                    <div class="data-item"><span class="data-label">大きさ</span><span class="data-value" style="font-size:14px;">${props.scale}</span></div>
                    <div class="data-item"><span class="data-label">勢力</span><span class="data-value" style="font-size:14px;">${props.intensity}</span></div>
                    <div class="data-item"><span class="data-label">移動</span><span class="data-value" style="font-size:14px;">${props.speed}</span></div>
                    <div class="data-item"><span class="data-label">中心気圧</span><span class="data-value">${props.pressure}<span>hPa</span></span></div>
                    <div class="data-item"><span class="data-label">最大風速</span><span class="data-value">${props.maxWind}<span>m/s</span></span></div>
                    <div class="data-item"><span class="data-label">最大瞬間風速</span><span class="data-value">${props.maxGust}<span>m/s</span></span></div>
                `;
            } else {
                document.getElementById('st-time').innerText = `${currentObsTime} 観測`;
                const formatVal = (val) => (val == null || val === 'undefined' || val === 'null' || val === '') ? '-' : val;
                grid.innerHTML = `
                    <div class="data-item"><span class="data-label">気温</span><span class="data-value" id="val-temp">${formatVal(props.temp)}<span>℃</span></span></div>
                    <div class="data-item"><span class="data-label">降水量</span><span class="data-value" id="val-prec">${formatVal(props.prec)}<span>mm</span></span></div>
                    <div class="data-item"><span class="data-label">風速</span><span class="data-value" id="val-wind">${formatVal(props.wind)}<span>m/s</span></span></div>
                    <div class="data-item"><span class="data-label">湿度</span><span class="data-value" id="val-hum">${formatVal(props.hum)}<span>%</span></span></div>
                `;
            }

            document.getElementById('detail-card').classList.add('show');
        }

        function showWarningDetail(areaName, kinds) {
            // スマホ時はドロワーを閉じてからカードを表示
            if (isMobile()) toggleDrawer(false);

            document.getElementById('st-name').innerText = areaName;
            document.getElementById('st-time').innerText = '発表中の情報';
            const grid = document.getElementById('detail-grid');
            const LEVEL_LABEL = { tokubetsu: '特別警報', kiken: '危険警報', keiho: '警報', chui: '注意報' };
            const sorted = [...kinds].sort((a, b) =>
                (LEVEL_PRIORITY[b.level] ?? 0) - (LEVEL_PRIORITY[a.level] ?? 0)
            );
            grid.style.gridTemplateColumns = '1fr';
            grid.innerHTML = sorted.map(k => `
                <div class="data-item" style="flex-direction:row; align-items:center; gap:8px;">
                    <span class="warn-badge ${k.level}">${LEVEL_LABEL[k.level]}</span>
                    <span class="data-value" style="font-size:13px; font-weight:500;">${k.name}</span>
                </div>
            `).join('');
            document.getElementById('detail-card').classList.add('show');
        }

        document.getElementById('btn-temp').onclick    = () => handleNavClick('temp');
        document.getElementById('btn-prec').onclick    = () => handleNavClick('prec');
        document.getElementById('btn-wind').onclick    = () => handleNavClick('wind');
        document.getElementById('btn-typhoon').onclick = () => handleNavClick('typhoon');
        document.getElementById('btn-warning').onclick = () => handleNavClick('warning');
        document.getElementById('btn-rank').onclick    = () => toggleDrawer();
        document.getElementById('close-detail').onclick = () => document.getElementById('detail-card').classList.remove('show');
        document.getElementById('legend-toggle').onclick = () => {
            legendCollapsed = !legendCollapsed;
            updateLegendToggle();
        };

        // --vh を実際の window.innerHeight から設定（ブラウザUIを除いた正確な高さ）
        function setVh() {
            const vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        setVh();

        // 画面サイズ・向き変更時に地図を再描画（地図の途切れ防止）
        const resizeMap = () => {
            setVh();
            if (map) setTimeout(() => map.resize(), 100);
        };
        window.addEventListener('resize', resizeMap);
        screen.orientation?.addEventListener('change', resizeMap);
        
        init();
    </script>
</body>
</html>

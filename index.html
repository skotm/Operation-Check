<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>気象情報可視化ツール</title>

    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>

    <!-- デバッグコンソール：できるだけ早期に初期化してすべてのエラーを捕捉 -->
    <script>
    (function() {
        const MAX_ENTRIES = 300;
        const getEl = () => document.getElementById('debug-log');

        function addEntry(type, args) {
            const el = getEl();
            if (!el) return;
            const text = args.map(a => {
                if (a instanceof Error) return `${a.name}: ${a.message}\n${a.stack || ''}`;
                if (a && typeof a === 'object') {
                    try { return JSON.stringify(a, null, 2); } catch { return String(a); }
                }
                return String(a);
            }).join(' ');
            const entry = document.createElement('div');
            entry.className = `debug-entry debug-${type}`;
            const now = new Date();
            const time = now.toLocaleTimeString('ja-JP', { hour12: false }) + '.' + String(now.getMilliseconds()).padStart(3, '0');
            entry.textContent = `[${time}] ${text}`;
            el.insertBefore(entry, el.firstChild);
            while (el.children.length > MAX_ENTRIES) el.removeChild(el.lastChild);
        }

        // console フック
        const _log   = console.log.bind(console);
        const _warn  = console.warn.bind(console);
        const _error = console.error.bind(console);
        console.log   = (...a) => { _log(...a);   addEntry('log',   a); };
        console.warn  = (...a) => { _warn(...a);  addEntry('warn',  a); };
        console.error = (...a) => { _error(...a); addEntry('error', a); };

        // 未処理エラー
        window.addEventListener('error', e => {
            addEntry('error', [`[JS Error] ${e.message} (${e.filename}:${e.lineno}:${e.colno})`]);
        });
        window.addEventListener('unhandledrejection', e => {
            const reason = e.reason instanceof Error
                ? `${e.reason.name}: ${e.reason.message}\n${e.reason.stack || ''}`
                : String(e.reason);
            addEntry('error', [`[UnhandledRejection] ${reason}`]);
        });

        // fetch フック：HTTPエラーをコンソールに流す
        const _fetch = window.fetch.bind(window);
        window.fetch = async (...args) => {
            const url = typeof args[0] === 'string' ? args[0] : args[0]?.url || '(unknown)';
            try {
                const res = await _fetch(...args);
                if (!res.ok) {
                    // タイルの404は大量に出るので除外、その他のAPIエラーのみ表示
                    const isTile = /\/(hrpns|land|inund|flood|flood_riskline|flood_name)\/\d+\/\d+\/\d+\.(png|pbf)/.test(url);
                    if (!isTile) {
                        console.warn(`[fetch] HTTP ${res.status} ${res.statusText} — ${url}`);
                    }
                }
                return res;
            } catch (e) {
                // AbortError はMapLibreがタイルをキャンセルする正常動作なので除外
                if (e?.name === 'AbortError') return Promise.reject(e);
                console.error(`[fetch] ネットワークエラー — ${url}`, e);
                throw e;
            }
        };

        console.log('[デバッグ] コンソール初期化完了');
    })();
    </script>

    <style>
        :root {
            --bg-color: #000000;
            --surface-color: rgba(28, 28, 30, 0.75);
            --surface-drawer: rgba(28, 28, 30, 0.85);
            --text-primary: #FFFFFF;
            --text-secondary: rgba(235, 235, 245, 0.6);
            --border-color: rgba(84, 84, 88, 0.4);
            --accent-color: #0A84FF;
            --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            --rail-width: 68px;
            --drawer-width: 320px;
            --bottom-nav-height: 60px;
        }

        body {
            margin: 0; padding: 0;
            width: 100vw;
            height: 100vh;
            height: calc(var(--vh, 1vh) * 100);
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            overflow: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
            touch-action: manipulation;
        }

        /* Navigation Rail */
        #nav-rail {
            position: absolute;
            top: 0; left: 0;
            width: var(--rail-width);
            height: 100%;
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            z-index: 2000;
            box-sizing: border-box;
        }

        .nav-btn {
            position: relative;
            width: 44px; height: 44px;
            margin-bottom: 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text-secondary);
        }

        .nav-btn.active {
            background-color: rgba(255, 255, 255, 0.15);
            color: var(--text-primary);
        }

        .nav-btn svg { width: 24px; height: 24px; }
        .spacer { flex: 1; }

        .nav-btn::before {
            content: '';
            position: absolute;
            left: -10px; top: 50%;
            transform: translateY(-50%) scaleY(0);
            width: 4px; height: 24px;
            background-color: var(--accent-color);
            border-radius: 0 4px 4px 0;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .nav-btn.active::before { transform: translateY(-50%) scaleY(1); }

        /* Drawer Panel */
        #drawer-panel {
            position: absolute;
            left: var(--rail-width);
            top: 0;
            width: var(--drawer-width);
            height: 100%;
            background: var(--surface-drawer);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-right: 1px solid var(--border-color);
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }
        #drawer-panel.show { transform: translateX(0); }

        /* Map */
        #map { 
            position: absolute;
            left: 0; top: 0;
            width: 100%; height: 100%;
        }

        .drawer-header {
            padding: 24px 20px;
            font-size: 18px;
            font-weight: 700;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        
        #ranking-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        #ranking-list::-webkit-scrollbar { width: 0px; }

        .rank-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .rank-item:hover { background: rgba(255, 255, 255, 0.1); }
        .rank-num { color: var(--text-secondary); display: inline-block; width: 24px; font-size: 12px; }
        .rank-name { flex: 1; font-weight: 500; font-size: 14px; }
        .rank-val { font-weight: 700; font-size: 16px; }

        /* PC: ドロワー展開時にdetail-cardをずらす */
        body.drawer-open #detail-card {
            left: calc(var(--drawer-width) + var(--rail-width) + 14px);
        }
        #detail-card, #legend-card {
            position: absolute;
            background: var(--surface-drawer);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 14px;
            border: 1px solid var(--border-color);
            z-index: 1500;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1),
                        opacity  0.3s ease,
                        left     0.4s cubic-bezier(0.2, 0.8, 0.2, 1),
                        bottom   0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        #detail-card {
            bottom: 18px;
            left: calc(var(--rail-width) + 14px);
            width: 230px;
            padding: 8px 10px 10px;
            transform: translateY(200%);
            opacity: 0;
            pointer-events: none;
        }
        #detail-card.show {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        /* PC: ドロワー展開時にdetail-cardをずらす */
        body.drawer-open #detail-card {
            left: calc(var(--drawer-width) + var(--rail-width) + 14px);
        }

        /* ×ボタン */
        #close-detail {
            position: absolute; top: 6px; left: 6px;
            width: 24px; height: 24px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-secondary);
            font-size: 14px;
        }

        #legend-card { bottom: 18px; right: 14px; min-width: 132px; padding: 8px 10px; }
        #legend-toggle {
            position: absolute; top: 6px; right: 6px;
            width: 24px; height: 24px;
            border: 0; border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
            color: var(--text-primary);
            font-size: 16px; line-height: 24px;
            cursor: pointer;
        }
        #legend-card.collapsed #legend-content { display: none; }
        #legend-card.collapsed { min-width: 96px; }

        /* MapLibre コントロール */
        .maplibregl-ctrl-bottom-right {
            transition: margin-bottom 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* ==========================================
           スマホ縦画面対応
        ========================================== */
        @media (max-width: 768px) {

            /* ナビを下部バーに */
            #nav-rail {
                top: auto; bottom: 0; left: 0;
                width: 100%;
                height: calc(var(--bottom-nav-height) + env(safe-area-inset-bottom, 0px));
                flex-direction: row;
                justify-content: space-around;
                border-right: none;
                border-top: 1px solid var(--border-color);
                padding: 0 10px calc(env(safe-area-inset-bottom, 0px));
            }
            .nav-btn { margin-bottom: 0; flex-shrink: 0; }
            .spacer { display: none; }

            /* インジケーターを上端に */
            .nav-btn::before {
                left: 50%; top: 0; bottom: auto;
                transform: translateX(-50%) scaleX(0);
                width: 24px; height: 4px;
                border-radius: 0 0 4px 4px;
                transform-origin: top;
            }
            .nav-btn.active::before { transform: translateX(-50%) scaleX(1); }

            /* ドロワーを下から上にスライド */
            #drawer-panel {
                top: auto;
                bottom: calc(var(--bottom-nav-height) + env(safe-area-inset-bottom, 0px));
                left: 0; width: 100%; height: 55vh;
                border-right: none;
                border-top: 1px solid var(--border-color);
                border-radius: 16px 16px 0 0;
                transform: translateY(100%);
            }
            #drawer-panel.show { transform: translateY(0); }

            /* ---- detail-card ---- */
            #detail-card {
                left: 10px;
                right: auto;
                bottom: calc(var(--bottom-nav-height) + env(safe-area-inset-bottom, 0px) + 8px);
                width: auto;
                max-width: calc(100vw - 20px);
                min-width: 200px;
                box-sizing: border-box;
                padding: 6px 8px 8px;
                transform: translateY(calc(100% + var(--bottom-nav-height) + env(safe-area-inset-bottom, 0px) + 16px));
                opacity: 0;
                pointer-events: none;
            }
            #detail-card.show {
                transform: translateY(0);
                opacity: 1;
                pointer-events: auto;
            }
            body.drawer-open #detail-card {
                transform: translateY(calc(100% + var(--bottom-nav-height) + env(safe-area-inset-bottom, 0px) + 16px));
                opacity: 0;
                pointer-events: none;
                left: 10px;
            }

            /* ---- legend-card ---- */
            #legend-card {
                bottom: calc(var(--bottom-nav-height) + env(safe-area-inset-bottom, 0px) + 8px);
                right: 10px;
                left: auto;
            }
            body.drawer-open #legend-card {
                opacity: 0;
                pointer-events: none;
            }

            /* ×・−ボタンをタップしやすく */
            #close-detail {
                width: 32px; height: 32px;
                font-size: 16px;
                top: 6px; left: 6px;
            }
            #legend-toggle {
                width: 32px; height: 32px;
                font-size: 18px; line-height: 32px;
                top: 6px; right: 6px;
            }

            /* status-bar */
            #status-bar { top: 12px; right: 12px; }

            /* MapLibre コントロールをナビの上に */
            .maplibregl-ctrl-bottom-right {
                margin-bottom: calc(var(--bottom-nav-height) + env(safe-area-inset-bottom, 0px));
            }
            body.drawer-open .maplibregl-ctrl-bottom-right {
                margin-bottom: calc(var(--bottom-nav-height) + env(safe-area-inset-bottom, 0px) + 55vh + 10px);
            }

        }

        /* 縦画面：スライダー表示中は凡例をスライダーの上にずらして被りを回避 */
        @media (max-width: 768px) and (orientation: portrait) {
            body:has(#radar-slider-bar.visible) #legend-card,
            body:has(#risk-slider-bar.visible) #legend-card {
                bottom: calc(var(--bottom-nav-height) + env(safe-area-inset-bottom, 0px) + 100px);
            }
        }

        @media (max-width: 768px) and (orientation: landscape) {
            #drawer-panel { height: 80vh; }
            body.drawer-open .maplibregl-ctrl-bottom-right {
                margin-bottom: calc(var(--bottom-nav-height) + env(safe-area-inset-bottom, 0px) + 80vh + 10px);
            }
            #nav-rail { padding: 0 40px calc(env(safe-area-inset-bottom, 0px)); }

            /* 横画面：下部中央配置、凡例と重なる場合のみ左にシフト */
            body:has(#radar-slider-bar.visible) #radar-slider-bar,
            body:has(#risk-slider-bar.visible) #risk-slider-bar {
                left: 8px;
                right: 172px;
                width: min(560px, calc(100vw - 180px));
                margin-left: auto;
                margin-right: auto;
                transform: none;
            }
        }

        /* PC・タブレット: 下部中央配置、凡例と重なる場合のみ左にシフト */
        @media (min-width: 769px) {
            body:has(#radar-slider-bar.visible) #radar-slider-bar,
            body:has(#risk-slider-bar.visible) #risk-slider-bar {
                left: calc(var(--rail-width) + 8px);
                right: 176px;
                width: min(560px, calc(100vw - var(--rail-width) - 184px));
                margin-left: auto;
                margin-right: auto;
                transform: none;
            }
        }

        .card-header { font-size: 15px; font-weight: 700; margin: 4px 0 3px; text-align: center; }
        .card-time { font-size: 11px; color: var(--text-secondary); margin-bottom: 7px; text-align: center; }
        
        .legend-item { display: flex; align-items: center; margin-bottom: 4px; font-size: 12px; color: var(--text-secondary); }
        .legend-color { width: 11px; height: 11px; border-radius: 3px; margin-right: 7px; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.2); }

        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .data-item { background: rgba(255, 255, 255, 0.05); padding: 6px 8px; border-radius: 8px; display: flex; flex-direction: column; }
        .data-label { font-size: 10px; color: var(--text-secondary); margin-bottom: 1px; }
        .data-value { font-size: 16px; font-weight: 700; }
        .data-value span { font-size: 11px; font-weight: 400; margin-left: 2px; }

        #status-bar {
            position: absolute; top: 20px; right: 20px;
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            padding: 8px 16px; border-radius: 40px;
            font-size: 12px; border: 1px solid var(--border-color);
            z-index: 1000;
        }

        .forecast-time-marker {
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.55);
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            line-height: 1.25;
            white-space: nowrap;
            text-shadow: 0 1px 2px #000;
            pointer-events: auto;
            cursor: pointer;
        }

        /* 警報バッジ */
        .warn-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 4px;
            white-space: nowrap;
        }
        .warn-badge.tokubetsu { background: #1a1a1a; color: #fff; border: 1px solid #666; }
        .warn-badge.kiken     { background: #AA00AA; color: #fff; }
        .warn-badge.keiho     { background: #FF2800; color: #fff; }
        .warn-badge.chui      { background: #FFEF00; color: #000; }

        .warn-rank-item {
            padding: 10px 14px;
            border-radius: 10px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .warn-rank-item:hover { background: rgba(255,255,255,0.08); }
        .warn-rank-area { font-size: 13px; font-weight: 600; margin-bottom: 5px; }
        .warn-rank-badges { display: flex; flex-wrap: wrap; gap: 3px; }

        /* ========== デバッグコンソールパネル ========== */
        #debug-panel {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 40vh;
            background: rgba(0,0,0,0.92);
            border-top: 1px solid #444;
            z-index: 9999;
            flex-direction: column;
            font-family: monospace;
        }
        #debug-panel.visible { display: flex; }
        #debug-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #1a1a1a;
            border-bottom: 1px solid #444;
            font-size: 12px;
            color: #aaa;
            flex-shrink: 0;
        }
        #debug-close { cursor: pointer; color: #888; font-size: 16px; }
        #debug-log {
            flex: 1;
            overflow-y: auto;
            padding: 6px 10px;
            font-size: 11px;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
        }
        .debug-entry { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.05); white-space: pre-wrap; word-break: break-all; }
        .debug-log   { color: #ccc; }
        .debug-warn  { color: #f90; }
        .debug-error { color: #f44; }

        /* ========== 警報サブモード切り替えボタン ========== */
        #warning-sub-toggle {
            position: absolute;
            top: 16px;
            left: calc(var(--rail-width) + 14px);
            z-index: 1500;
            display: none;
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 3px;
            flex-direction: row;
            gap: 0;
            transition: left 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        #warning-sub-toggle.visible { display: flex; }
        body.drawer-open #warning-sub-toggle {
            left: calc(var(--drawer-width) + var(--rail-width) + 14px);
        }

        /* ========== キキクルレイヤー切り替えボタン ========== */
        #risk-layer-toggle {
            position: absolute;
            top: 58px; /* warning-sub-toggleの下 */
            left: calc(var(--rail-width) + 14px);
            z-index: 1500;
            display: none;
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 3px;
            flex-direction: row;
            gap: 0;
            transition: left 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        #risk-layer-toggle.visible { display: flex; }
        body.drawer-open #risk-layer-toggle {
            left: calc(var(--drawer-width) + var(--rail-width) + 14px);
        }

        /* ========== 降水サブモード切り替えボタン ========== */
        #prec-sub-toggle {
            position: absolute;
            top: 16px;
            left: calc(var(--rail-width) + 14px);
            z-index: 1500;
            display: none; /* precモード時のみ表示 */
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 3px;
            flex-direction: row;
            gap: 0;
            transition: left 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        #prec-sub-toggle.visible { display: flex; }
        body.drawer-open #prec-sub-toggle {
            left: calc(var(--drawer-width) + var(--rail-width) + 14px);
        }
        .prec-sub-btn {
            padding: 5px 12px;
            border-radius: 7px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-secondary);
            transition: background 0.2s, color 0.2s;
            white-space: nowrap;
            user-select: none;
        }
        .prec-sub-btn.active {
            background: rgba(255, 255, 255, 0.18);
            color: var(--text-primary);
        }

        /* ========== タイムスライダー共通（雨雲レーダー・キキクル） ========== */
        #radar-slider-bar,
        #risk-slider-bar {
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1500;
            display: none;
            width: min(560px, calc(100vw - var(--rail-width) - 28px));
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 10px 16px 12px;
            box-sizing: border-box;
            left: calc(var(--rail-width) / 2 + 50%);
        }
        #radar-slider-bar.visible,
        #risk-slider-bar.visible { display: block; }

        .slider-time-label {
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }
        .radar-nowcast-tag {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            background: #0A84FF;
            color: #fff;
            border-radius: 4px;
            padding: 1px 5px;
            margin-left: 6px;
            vertical-align: middle;
        }

        // code → {level, kinds[]} の警報マップ（取得後に構築）

            if (temp >= 35) return '#B40068';
            if (temp >= 30) return '#FF2800';
            if (temp >= 25) return '#FF9900';
            if (temp >= 20) return '#FFEF00';
            if (temp >= 15) return '#99FF00';
            if (temp >= 10) return '#00FF00';

        }

        const MAP_CACHE_NAME = 'wisviewer-map-v1';

        async function loadMapData(path) {
            // Cache APIが使える環境ではキャッシュから返す
            if ('caches' in window) {
                try {
                    const cache = await caches.open(MAP_CACHE_NAME);
                    const cached = await cache.match(path);
                    if (cached) {
                        const data = await cached.json();
                        return normalizeGeoJSON(data);
                    }
                    // キャッシュなし → fetch してキャッシュに保存
                    const res = await fetch(path);
                    if (!res.ok) throw new Error(`Failed to load map data: ${path}`);
                    await cache.put(path, res.clone());
                    const data = await res.json();
                    return normalizeGeoJSON(data);
                } catch (e) {
                    // Cache API失敗時はフォールバック
                }
            }
            // フォールバック: 通常のfetch
            const res = await fetch(path);
            if (!res.ok) throw new Error(`Failed to load map data: ${path}`);
            const data = await res.json();
            return normalizeGeoJSON(data);
        }

        function normalizeGeoJSON(data) {
            if (data.type === 'FeatureCollection') return data;
            if (data.type === 'Feature') return { type: 'FeatureCollection', features: [data] };
            if (data.type === 'GeometryCollection') {
                return {
                    type: 'FeatureCollection',
                    features: data.geometries.map((geometry, index) => ({
                        type: 'Feature',
                        properties: { id: index },
                        geometry
                    }))
                };
            }
            return data;

            if (prec >= 20) return '#FFEF00';
            if (prec >= 10) return '#0000FF';
            if (prec >= 1)  return '#0099FF';
            return '#A0D2FF';
        }
        function getPointRadiusExpression(mode) {

            { limit: 0,  color: '#0099FF', label: '5m/s未満' }
        ];

        // 気象庁の座標を GeoJSON 用の [経度, 緯度] に変換
        function parseJMACoord(coord) {
            if (!coord) return null;

            if (Array.isArray(coord) && coord.length >= 2) {
                const lat = Number(coord[0]);
                const lon = Number(coord[1]);
                return Number.isFinite(lat) && Number.isFinite(lon) ? [lon, lat] : null;
            }

            const match = String(coord).match(/([+-]\d+(?:\.\d+)?)([+-]\d+(?:\.\d+)?)/);
            if (match) {
                const lat = parseFloat(match[1]);
                const lon = parseFloat(match[2]);
                return [lon, lat];
            }
            return null;
        }

        function getJMATyphoonRadiusKm(value) {
            if (value == null) return null;
            if (typeof value === 'number') return value / 1000;
            if (Array.isArray(value)) return getJMATyphoonRadiusKm(value[0]);
            if (typeof value === 'object') {
                if (typeof value.radius === 'number') return value.radius / 1000;
                if (typeof value.base === 'number') return value.base / 1000;
                if (Array.isArray(value.base)) return getJMATyphoonRadiusKm(value.base[0]);
            }
            return null;

            const center = parseJMACoord(arc?.[0]);
            const radiusKm = getJMATyphoonRadiusKm(arc?.[1]);
            const angles = arc?.[2];
            if (!center || !radiusKm || !Array.isArray(angles)) return null;

            let start = Number(angles[0]);
            let end = Number(angles[1]);
            if (!Number.isFinite(start) || !Number.isFinite(end)) return null;
            if (end < start) end += 360;

            const span = Math.max(1, end - start);
            const steps = Math.max(8, Math.ceil(span / 5));
            const centerPoint = turf.point(center);
            const coordinates = [];
            for (let i = 0; i <= steps; i++) {
                const bearing = start + (span * i / steps);
                coordinates.push(turf.destination(centerPoint, radiusKm, bearing, { units: 'kilometers' }).geometry.coordinates);
            }
            return coordinates;
        }

        function buildStormWarningAreaFeature(stormWarningArea) {
            const segments = [];

            (stormWarningArea?.arc || []).forEach(arc => {
                const segment = makeStormWarningArcSegment(arc);
                if (segment && segment.length >= 2) segments.push(segment);
            });

            (stormWarningArea?.line || []).forEach(line => {
                const start = parseJMACoord(line?.[0]);
                const end = parseJMACoord(line?.[1]);
                if (start && end) segments.push([start, end]);
            });

            if (segments.length === 0) return null;
            const unused = segments.slice(1);
            const ring = segments[0].slice();

            while (unused.length > 0) {
                const tail = ring[ring.length - 1];
                let bestIndex = 0;
                let bestReverse = false;
                let bestDistance = Infinity;

                unused.forEach((segment, index) => {
                    const startDistance = getPointDistanceSq(tail, segment[0]);
                    const endDistance = getPointDistanceSq(tail, segment[segment.length - 1]);
                    if (startDistance < bestDistance) {
                        bestIndex = index;
                        bestReverse = false;
                        bestDistance = startDistance;
                    }
                    if (endDistance < bestDistance) {
                        bestIndex = index;
                        bestReverse = true;
                        bestDistance = endDistance;
                    }
                });

                const next = unused.splice(bestIndex, 1)[0];
                const ordered = bestReverse ? next.slice().reverse() : next;
                ring.push(...ordered.slice(1));
            }

            if (getPointDistanceSq(ring[0], ring[ring.length - 1]) > 0) {
                ring.push(ring[0]);
            }

            return turf.polygon([ring], { type: 'stormWarningArea' });
        }

        function formatForecastTimeLabel(time) {
            if (!time) return '予報';
            const date = new Date(time);
            if (Number.isNaN(date.getTime())) return '予報';
            const day = date.getDate();
            const hour = date.getHours();
            if (hour === 0) return `${day}日午前0時`;
            if (hour < 12) return `${day}日午前${hour}時`;
            if (hour === 12) return `${day}日午後0時`;
            return `${day}日午後${hour - 12}時`;
        }

        function clearForecastTimeMarkers() {
            forecastTimeMarkers.forEach(marker => marker.remove());
            forecastTimeMarkers = [];
        }

        function updateForecastTimeMarkers(visible) {
            clearForecastTimeMarkers();
            if (!visible || !map) return;

            typhoonGeojson.features
                .filter(feature => feature.properties?.type === 'forecastCircle')
                .forEach(feature => {
                    const label = feature.properties.forecastTime;
                    const center = feature.properties.labelPoint;
                    if (!label || !center) return;

                    const el = document.createElement('div');
                    el.className = 'forecast-time-marker';
                    el.textContent = label;
                    el.onclick = (event) => {
                        event.stopPropagation();
                        showDetail(feature.properties);
                    };
                    forecastTimeMarkers.push(new maplibregl.Marker({ element: el, anchor: 'center' }).setLngLat(center).addTo(map));
                });
        }
        function isMobile() { return window.innerWidth <= 768; }

        // ---- 警報データ取得（新API r8 のみ）----
        async function fetchWarningData() {
            warningMap = {};

            const results = await Promise.allSettled(
                WARNING_PREF_CODES.map(code =>
                    fetch(`https://www.jma.go.jp/bosai/warning/data/r8/${code}.json`, { cache: 'no-store' })
                        .then(r => r.ok ? r.json() : null)
                        .catch(() => null)
                )
            );

            results.forEach(result => {
                if (result.status !== 'fulfilled' || !result.value) return;
                const dataArr = result.value;
                const arr = Array.isArray(dataArr) ? dataArr : [dataArr];

                arr.forEach(entry => {
                    // 新API: entry.warning.class20Items[].areaCode が7桁の市区町村コード
                    const items = entry?.warning?.class20Items ?? [];
                    items.forEach(item => {
                        const regioncode = String(item.areaCode ?? '').trim();
                        if (!regioncode) return;

                        const kinds = (item.kinds ?? [])
                            .filter(k => {
                                const s = String(k.status ?? '').trim();
                                return s !== '' && s !== '解除';
                            })
                            .map(k => {
                                // コードは数値の場合もあるので2桁ゼロ埋め文字列に正規化
                                const codeStr = String(k.code ?? '').trim().padStart(2, '0');
                                return WARNING_KIND_MAP[codeStr] ?? null;
                            })
                            .filter(Boolean);

                        if (kinds.length === 0) return;
                        mergeWarning(regioncode, kinds);
                    });
                });
            });

            console.log(`[警報] warningMap件数: ${Object.keys(warningMap).length}`);
            if (Object.keys(warningMap).length > 0) {
                console.log('[警報] サンプル:', Object.entries(warningMap).slice(0, 3));
            }
        }

        function mergeWarning(regioncode, newKinds) {
            const existing = warningMap[regioncode];
            const merged = existing ? [...existing.kinds, ...newKinds] : newKinds;
            const seen = new Set();
            const deduped = merged.filter(k => {
                if (seen.has(k.name)) return false;
                seen.add(k.name);
                return true;
            });
            const topLevel = deduped.reduce((best, k) =>
                (LEVEL_PRIORITY[k.level] ?? 0) > (LEVEL_PRIORITY[best.level] ?? 0) ? k : best
            );
            warningMap[regioncode] = { level: topLevel.level, kinds: deduped };
        }

        // ---- 氾濫系警報コード → {name, level} に変換 ----
        // 気象庁 flood_xml.json の item.code は先頭の十の位でレベルが決まる
        // 1x = 解除 / 2x = 氾濫注意報 / 3x = 氾濫警報 / 4x = 氾濫危険警報 / 5x = 氾濫特別警報
        function getFloodWarningKind(codeStr) {
            const n = parseInt(codeStr, 10);
            if (n >= 20 && n < 30) return { name: '氾濫注意報',   level: 'chui' };
            if (n >= 30 && n < 40) return { name: '氾濫警報',     level: 'keiho' };
            if (n >= 40 && n < 50) return { name: '氾濫危険警報', level: 'kiken' };
            if (n >= 50)            return { name: '氾濫特別警報', level: 'tokubetsu' };
            return null; // 1x = 解除, その他 = 不明 → スキップ
        }

        // ---- 氾濫系警報データ取得（flood/data/r8/flood_xml.json）----
        async function fetchFloodWarningData() {
            try {
                const res = await fetch('https://www.jma.go.jp/bosai/flood/data/r8/flood_xml.json', { cache: 'no-store' });
                if (!res.ok) return;
                const data = await res.json();
                if (!Array.isArray(data)) return;

                let count = 0;
                data.forEach(entry => {
                    const kind = getFloodWarningKind(String(entry?.item?.code ?? '').trim());
                    if (!kind) return; // 解除または不明コードはスキップ

                    // class20Codes は7桁の市区町村コードで warningMap の regioncode と一致する
                    (entry?.class20Codes ?? []).forEach(rc => {
                        const regioncode = String(rc).trim();
                        if (regioncode) {
                            mergeWarning(regioncode, [kind]);
                            count++;
                        }
                    });
                });

                console.log(`[氾濫警報] flood_xml.json 処理: ${count} 件のエリアにマージ`);
            } catch (e) {
                console.warn('[氾濫警報] flood_xml.json 取得失敗:', e);
            }
        }

        function applyWarningColors() {
            if (!warningAreasGeojson || !map.getSource('warning-areas')) return;
            const updated = {
                ...warningAreasGeojson,
                features: warningAreasGeojson.features.map(f => {
                    const code = f.properties.regioncode;
                    const warn = warningMap[code];
                    return {
                        ...f,
                        properties: {
                            ...f.properties,
                            warnLevel: warn ? warn.level : '',
                            warnColor: warn ? LEVEL_COLOR[warn.level] : 'transparent',
                        }
                    };
                })
            };
            map.getSource('warning-areas').setData(updated);
        }

        async function fetchJsonOrNull(url) {
            const res = await fetch(url, { cache: 'no-store' });
            if (!res.ok) return null;
            return res.json();
        }

        // --- 台風データの取得と空間処理（コアロジック） ---
        async function fetchTyphoonData() {
            const features = [];
            const base = 'https://www.jma.go.jp/bosai/typhoon/data';

            try {
                const targetTc = await fetchJsonOrNull(`${base}/targetTc.json`);
                if (!Array.isArray(targetTc) || targetTc.length === 0) {
                    return turf.featureCollection([]);
                }

                const typhoonData = await Promise.all(targetTc.map(async (tc) => {
                    const id = tc.tropicalCyclone;
                    const [forecast, specifications] = await Promise.all([
                        fetchJsonOrNull(`${base}/${id}/forecast.json`),
                        fetchJsonOrNull(`${base}/${id}/specifications.json`)
                    ]);
                    return { tc, forecast: Array.isArray(forecast) ? forecast : [], specifications: Array.isArray(specifications) ? specifications : [] };
                }));

                typhoonData.forEach(({ tc, forecast, specifications }) => {
                    const title = forecast.find(item => item.part === 'title') || specifications.find(item => item.part === 'title') || tc;
                    const specNow = specifications.find(item => item.advancedHours === 0) || {};
                    const points = forecast.filter(item => item && item.advancedHours !== undefined && item.center);
                    const current = points.find(item => item.advancedHours === 0) || points[0];
                    if (!current) return;

                    const centerPos = parseJMACoord(current.center);
                    if (!centerPos) return;

                    const typhoonNo = String(title.typhoonNumber || tc.typhoonNumber || '').slice(-2).replace(/^0/, '');
                    const name = title.name?.jp || title.name?.en || '';
                    const maxWind = specNow.maximumWind?.sustained?.['m/s'] || specNow.maximumWind?.sustained?.mps || '不明';
                    const maxGust = specNow.maximumWind?.gust?.['m/s'] || specNow.maximumWind?.gust?.mps || '不明';

                    features.push(turf.point(centerPos, {
                        type: 'center',
                        name: `${Number(typhoonNo) ? `台風第${Number(typhoonNo)}号` : '熱帯低気圧'}${name ? ` (${name})` : ''}`,
                        pressure: specNow.pressure || '不明',
                        maxWind,
                        maxGust,
                        scale: specNow.scale || '-',
                        intensity: specNow.intensity || tc.category || '-',
                        speed: specNow.speed?.['km/h'] ? `${specNow.course || ''} ${specNow.speed['km/h']}km/h`.trim() : (specNow.course || '-')
                    }));

                    const stormRadiusKm = getJMATyphoonRadiusKm(current.stormWarningArea?.arc?.[0]?.[1]);
                    if (stormRadiusKm) {
                        features.push(turf.circle(centerPos, stormRadiusKm, { steps: 64, units: 'kilometers', properties: { type: 'stormArea' } }));
                    }

                    const galeRadiusKm = getJMATyphoonRadiusKm(current.galeWarningArea?.radius);
                    if (galeRadiusKm) {
                        const galeCenter = parseJMACoord(current.galeWarningArea?.center) || centerPos;
                        features.push(turf.circle(galeCenter, galeRadiusKm, { steps: 64, units: 'kilometers', properties: { type: 'windArea' } }));
                    }

                    const pastTrack = [
                        ...(current.track?.preTyphoon || []),
                        ...(current.track?.typhoon || [])
                    ].map(point => parseJMACoord(point)).filter(Boolean);
                    if (pastTrack.length >= 2) {
                        features.push(turf.lineString(pastTrack, { type: 'pastTrack' }));
                    }

                    const forecastTrack = points.map(item => parseJMACoord(item.center)).filter(Boolean);
                    if (forecastTrack.length >= 2) {
                        features.push(turf.lineString(forecastTrack, { type: 'track' }));
                    }

                    const stormWarningSource = points.slice().reverse().find(item => item.stormWarningArea?.arc?.length);
                    const stormWarningArea = buildStormWarningAreaFeature(stormWarningSource?.stormWarningArea);
                    if (stormWarningArea) {
                        features.push(stormWarningArea);
                    }

                    const forecastCircles = [];
                    points.forEach(item => {
                        if (item.advancedHours === 0 || !item.probabilityCircle?.radius) return;
                        const fPos = parseJMACoord(item.center);
                        const radiusKm = getJMATyphoonRadiusKm(item.probabilityCircle.radius);
                        if (!fPos || !radiusKm) return;

                        const forecastLabel = formatForecastTimeLabel(item.validtime?.JST || item.validtime?.UTC);
                        const forecastSpec = specifications.find(spec => spec.advancedHours === item.advancedHours) || {};
                        const labelPoint = turf.destination(turf.point(fPos), radiusKm + 35, 45, { units: 'kilometers' }).geometry.coordinates;
                        const circle = turf.circle(fPos, radiusKm, {
                            steps: 64,
                            units: 'kilometers',
                            properties: {
                                type: 'forecastCircle',
                                name: `${Number(typhoonNo) ? `台風第${Number(typhoonNo)}号` : '熱帯低気圧'}${name ? ` (${name})` : ''}`,
                                forecastTime: forecastLabel,
                                labelPoint,
                                pressure: forecastSpec.pressure || '不明',
                                maxWind: forecastSpec.maximumWind?.sustained?.['m/s'] || '不明',
                                maxGust: forecastSpec.maximumWind?.gust?.['m/s'] || '不明',
                                scale: forecastSpec.scale || '-',
                                intensity: forecastSpec.intensity || tc.category || '-',
                                speed: forecastSpec.speed?.['km/h'] ? `${forecastSpec.course || ''} ${forecastSpec.speed['km/h']}km/h`.trim() : (forecastSpec.course || '-')
                            }
                        });
                        forecastCircles.push(circle);
                        features.push(circle);
                    });

                    if (forecastCircles.length > 0) {
                        let previousCircle = turf.circle(centerPos, 1, { steps: 64, units: 'kilometers' });
                        let finalWarningArea = null;

                        forecastCircles.forEach(circle => {
                            const warningAreaSegment = turf.convex(turf.explode(turf.featureCollection([previousCircle, circle])));
                            if (warningAreaSegment) {
                                finalWarningArea = finalWarningArea ? turf.union(finalWarningArea, warningAreaSegment) || finalWarningArea : warningAreaSegment;
                            }
                            previousCircle = circle;
                        });

                        if (finalWarningArea) {
                            finalWarningArea.properties = { type: 'forecastArea' };
                            features.push(finalWarningArea);
                        }
                    }
                });

                return turf.featureCollection(features);
            } catch (e) {
                console.warn('Typhoon data fetch failed:', e);
                return turf.featureCollection([]);
            }
        }
        // ============================================================
        //  雨雲レーダー関連
        // ============================================================

        // 気象庁 高解像度降水ナウキャスト タイルURL生成
        // basetime: API取得時刻文字列, validtime: 対象時刻文字列
        // zoomLevel: 偶数ズームを固定指定（気象庁は偶数ズームのみ提供）
        function radarTileUrl(basetime, member, validtime, zoomLevel) {
            if (zoomLevel !== undefined) {
                // 固定ズームURL: {x}/{y} のみ可変、z は固定値
                return `https://www.jma.go.jp/bosai/jmatile/data/nowc/${basetime}/${member}/${validtime}/surf/hrpns/${zoomLevel}/{x}/{y}.png`;
            }
            return `https://www.jma.go.jp/bosai/jmatile/data/nowc/${basetime}/${member}/${validtime}/surf/hrpns/{z}/{x}/{y}.png`;
        }

        // 気象庁が提供する偶数ズームレベル一覧
        // 各ソースは [minzoom, maxzoom] の範囲で担当し、奇数ズームでは1段下の偶数ズームタイルをオーバーズームで表示
        // 例: z=5（奇数）→ z=4ソースが maxzoom:5 まで担当（z=4タイルを引き伸ばして表示）
        const RADAR_ZOOM_LEVELS = [
            { z: 2, minzoom: 1, maxzoom: 3  },
            { z: 4, minzoom: 3, maxzoom: 5  },
            { z: 6, minzoom: 5, maxzoom: 7  },
            { z: 8, minzoom: 7, maxzoom: 9  },
            { z: 10, minzoom: 9, maxzoom: 22 },
        ];

        // validtime文字列 (yyyyMMddHHmmss) はUTC格納
        // JSTに変換して表示用Dateを返す（.getUTC*() でJSTとして読む）
        function nowcStrToJST(s) {
            const utcMs = Date.UTC(
                +s.slice(0,4), +s.slice(4,6)-1, +s.slice(6,8),
                +s.slice(8,10), +s.slice(10,12), +s.slice(12,14)
            );
            return new Date(utcMs + 9 * 3600 * 1000);
        }
        function nowcDateLabel(s) {
            const d = nowcStrToJST(s);
            const pad = n => String(n).padStart(2, '0');
            return `${d.getUTCFullYear()}/${pad(d.getUTCMonth()+1)}/${pad(d.getUTCDate())} ${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}`;
        }
        function nowcStrToMs(s) {
            return Date.UTC(+s.slice(0,4),+s.slice(4,6)-1,+s.slice(6,8),+s.slice(8,10),+s.slice(10,12),+s.slice(12,14));
        }
        // ms タイムスタンプ → JMA時刻文字列 (yyyyMMddHHmm00)
        function msToNowcStr(ms) {
            const d = new Date(ms);
            const p = n => String(n).padStart(2, '0');
            return `${d.getUTCFullYear()}${p(d.getUTCMonth()+1)}${p(d.getUTCDate())}${p(d.getUTCHours())}${p(d.getUTCMinutes())}00`;
        }

        async function loadRadarFrames() {
            // 多重実行防止: 前のフェッチが完了していない場合はスキップ
            if (radarFetchInProgress) return;
            radarFetchInProgress = true;
            const isRadarVisible = currentMode === 'prec';
            // タブを再表示するたびに最新データを取得（5分ごとに更新されるため）
            try {
                if (isRadarVisible) document.getElementById('status-bar').innerText = 'レーダーデータ取得中...';
                const res = await fetch(
                    'https://www.jma.go.jp/bosai/jmatile/data/nowc/targetTimes_N1.json',
                    { cache: 'no-store' }
                );
                if (!res.ok) throw new Error('JMA nowc API error');
                const times = await res.json(); // [{basetime, validtime}, ...]

                if (!Array.isArray(times) || times.length === 0) throw new Error('No frames');

                // validtimeでソート（古い順）
                radarFrames = times
                    .slice()
                    .sort((a, b) => a.validtime.localeCompare(b.validtime))
                    .map(t => ({
                        basetime: t.basetime,
                        validtime: t.validtime,
                        member: t.member ?? 'none',   // タイルURL の member セグメントに使用
                        isNowcast: nowcStrToMs(t.validtime) > nowcStrToMs(t.basetime)
                    }));

                radarLoaded = true;

                // ---- 予測フレームの補完 ----------------------------------------
                // targetTimes_N1.json が basetime==validtime な観測フレームのみ返す場合、
                // isNowcast が1件もtrueにならず予測帯が存在しない。
                // その場合、最新観測時刻を5分切り捨てしたものをbaseとして
                // T+5〜T+60分（5分間隔12フレーム）の予測フレームを合成する。
                // 気象庁はこのURLパスで hrpns 予測タイルを公開しているため
                // 合成フレームでもタイルが取得できる。
                const FIVE_MIN = 5 * 60 * 1000;
                if (!radarFrames.some(f => f.isNowcast) && radarFrames.length > 0) {
                    const latestMs = nowcStrToMs(radarFrames[radarFrames.length - 1].validtime);
                    const baseMs   = Math.floor(latestMs / FIVE_MIN) * FIVE_MIN;
                    const basetime = msToNowcStr(baseMs);
                    for (let i = 1; i <= 12; i++) {
                        radarFrames.push({
                            basetime,
                            validtime: msToNowcStr(baseMs + i * FIVE_MIN),
                            member: 'none',
                            isNowcast: true
                        });
                    }
                    console.debug(`[Radar] N1.jsonに予測フレームなし → 合成12件追加 base:${basetime}`);
                }
                console.debug(`[Radar] 計${radarFrames.length}フレーム / 予測${radarFrames.filter(f=>f.isNowcast).length}件`);
                // -------------------------------------------------------------

                // スライダー max を更新
                // radarIndex は初回のみ「最新観測フレーム」に設定する。
                // 再呼び出し時はユーザーが見ているフレームを保持するため強制リセットしない。
                const slider = document.getElementById('radar-slider');
                slider.max = radarFrames.length - 1;
                const initIdx = radarFrames.reduce((best, f, i) => !f.isNowcast ? i : best, radarFrames.length - 1);
                if (!_radarInitialized) {
                    // 初回のみ最新観測フレームにセット
                    slider.value = initIdx;
                    radarIndex = initIdx;
                    _radarInitialized = true;
                } else {
                    // 再取得時：radarIndexが新しいフレーム数を超えていたらクランプ
                    radarIndex = Math.min(radarIndex, radarFrames.length - 1);
                    slider.value = radarIndex;
                }

                // MapLibreにソース・レイヤーを追加（初回のみ）
                // 気象庁は偶数ズーム(2,4,6,8,10)のみタイルを提供するため、
                // ズームレベルごとに独立したソースを登録し、奇数ズームでは
                // 1段下の偶数ズームタイルをオーバーズームで表示して空白を防ぐ。
                const firstFrame = radarFrames[radarIndex];
                const radarAttr = "<a href='https://www.jma.go.jp/bosai/nowc/' target='_blank'>気象庁 高解像度降水ナウキャスト</a>";
                RADAR_ZOOM_LEVELS.forEach(({ z, minzoom, maxzoom }) => {
                    const srcId = `${RADAR_SRC}-z${z}`;
                    const lyrId = `${RADAR_LYR}-z${z}`;
                    if (!map.getSource(srcId)) {
                        map.addSource(srcId, {
                            type: 'raster',
                            // 固定ズームURLで {z} は使わず z を埋め込み済み、{x}/{y} のみ可変
                            tiles: [radarTileUrl(firstFrame.basetime, firstFrame.member, firstFrame.validtime, z)],
                            tileSize: 256,
                            minzoom: 0,
                            maxzoom: z, // このソースが持つタイルの上限ズーム
                            bounds: [118, 20, 150, 48],
                            attribution: radarAttr
                        });
                        map.addLayer({
                            id: lyrId,
                            type: 'raster',
                            source: srcId,
                            minzoom, // このレイヤーが表示される下限
                            maxzoom, // このレイヤーが表示される上限（次の偶数ソースに引き継ぐ）
                            layout: { visibility: 'none' },
                            paint: { 'raster-opacity': 0.75 }
                        }, 'layer-points');
                    }
                });

                // 境界線オーバーレイは「precタブ かつ radarサブモード」のときのみ表示
                const overlayVis = (currentMode === 'prec' && precSubMode === 'radar') ? 'visible' : 'none';
                if (map.getLayer('world-line-overlay')) map.setLayoutProperty('world-line-overlay', 'visibility', overlayVis);
                if (map.getLayer('pref-line-overlay'))  map.setLayoutProperty('pref-line-overlay',  'visibility', overlayVis);

                updateRadarFrame();
                if (isRadarVisible) document.getElementById('status-bar').innerText = 'LIVE: レーダー表示中';
            } catch (e) {
                console.error('Radar load failed:', e);
                if (isRadarVisible) document.getElementById('status-bar').innerText = 'レーダー取得失敗';
            } finally {
                radarFetchInProgress = false;
            }
        }

        function updateRadarFrame() {
            if (!radarFrames.length || !map.getSource(`${RADAR_SRC}-z2`)) return;
            const frame = radarFrames[radarIndex];

            // タイルURLを最新フレームに更新（表示中かどうかに関わらず常に実施）
            // visibility の変更は prec タブ表示中のみ行う（他タブ滞在中に勝手に表示させない）
            const shouldShow = currentMode === 'prec';
            RADAR_ZOOM_LEVELS.forEach(({ z }) => {
                const srcId = `${RADAR_SRC}-z${z}`;
                const lyrId = `${RADAR_LYR}-z${z}`;
                if (map.getSource(srcId)) {
                    map.getSource(srcId).setTiles([radarTileUrl(frame.basetime, frame.member, frame.validtime, z)]);
                }
                if (shouldShow && map.getLayer(lyrId)) {
                    map.setLayoutProperty(lyrId, 'visibility', 'visible');
                }
            });
            radarCurrentTileUrl = radarTileUrl(frame.basetime, frame.member, frame.validtime, 10);

            // スライダーとラベルを更新
            document.getElementById('radar-slider').value = radarIndex;
            const label = nowcDateLabel(frame.validtime);
            const nowcastTag = frame.isNowcast ? '<span class="radar-nowcast-tag">予測</span>' : '';
            document.getElementById('radar-time-label').innerHTML = label + nowcastTag;

            // スライダーのグラデーション（観測帯:青 / 予測帯:緑 / 未再生:薄グレー）
            const total = radarFrames.length - 1;
            const pct = total > 0 ? (radarIndex / total) * 100 : 100;
            const lastObsIdx = radarFrames.reduce((best, f, i) => !f.isNowcast ? i : best, -1);
            const hasNowcast = radarFrames.some(f => f.isNowcast);
            const obsPct = hasNowcast && lastObsIdx >= 0 ? (lastObsIdx / total) * 100 : 100;
            const slider = document.getElementById('radar-slider');
            if (hasNowcast) {
                if (pct <= obsPct) {
                    // スライダーが観測帯内: 青(再生済) / グレー(観測未再生) / 薄緑(予測帯)
                    slider.style.background = `linear-gradient(to right,
                        #0A84FF 0%, #0A84FF ${pct}%,
                        rgba(255,255,255,0.15) ${pct}%, rgba(255,255,255,0.15) ${obsPct}%,
                        rgba(48,209,88,0.25) ${obsPct}%, rgba(48,209,88,0.25) 100%)`;
                } else {
                    // スライダーが予測帯内: 青(観測帯) / 緑(予測再生済) / グレー(予測未再生)
                    slider.style.background = `linear-gradient(to right,
                        #0A84FF 0%, #0A84FF ${obsPct}%,
                        rgba(48,209,88,0.9) ${obsPct}%, rgba(48,209,88,0.9) ${pct}%,
                        rgba(255,255,255,0.15) ${pct}%, rgba(255,255,255,0.15) 100%)`;
                }
            } else {
                slider.style.background = `linear-gradient(to right, #0A84FF ${pct}%, rgba(255,255,255,0.2) ${pct}%)`;
            }
        }

        function radarSeek(index) {
            radarIndex = Math.max(0, Math.min(radarFrames.length - 1, index));
            updateRadarFrame();
        }

        function radarStep(delta) {
            radarSeek(radarIndex + delta);
        }

        function radarGoLatest() {
            // 「現在」= 最新の観測フレーム（予測ではなく実レーダー観測の最新時刻）
            const latestObsIdx = radarFrames.reduce((best, f, i) => !f.isNowcast ? i : best, 0);
            radarSeek(latestObsIdx);
        }

        function radarTogglePlay() {
            const btn = document.getElementById('radar-play-btn');
            if (radarTimer) {
                clearInterval(radarTimer);
                radarTimer = null;
                btn.innerHTML = '&#9654;';
                btn.classList.remove('playing');
            } else {
                btn.innerHTML = '&#9646;&#9646;';
                btn.classList.add('playing');
                radarTimer = setInterval(() => {
                    const next = (radarIndex + 1) % radarFrames.length;
                    radarSeek(next);
                }, 800);
            }
        }

        function stopRadarPlay() {
            if (radarTimer) {
                clearInterval(radarTimer);
                radarTimer = null;
                const btn = document.getElementById('radar-play-btn');
                if (btn) { btn.innerHTML = '&#9654;'; btn.classList.remove('playing'); }
            }
        }

        // precサブモード切り替え
        function setPrecSubMode(mode) {
            precSubMode = mode;
            document.getElementById('btn-sub-radar').classList.toggle('active', mode === 'radar');
            document.getElementById('btn-sub-amedas').classList.toggle('active', mode === 'amedas');

            const sliderBar = document.getElementById('radar-slider-bar');

            if (mode === 'radar') {
                // ---- 雨雲レーダーモード ----
                sliderBar.classList.add('visible');
                document.getElementById('status-bar').innerText = 'LIVE: レーダー表示中';
                if (map.getLayer('layer-points')) {
                    map.setLayoutProperty('layer-points', 'visibility', 'none');
                }
                loadRadarFrames();
            } else {
                // ---- 観測値モード ----
                // スライダー非表示・再生停止
                sliderBar.classList.remove('visible');
                stopRadarPlay();
                document.getElementById('status-bar').innerText =
                    currentObsTime !== '--:--' ? `LIVE: ${currentObsTime} 観測` : 'AMeDASデータ読込中...';

                // レーダーを最新観測フレームに固定して背景表示
                if (radarFrames.length > 0) {
                    radarIndex = radarFrames.reduce((best, f, i) => !f.isNowcast ? i : best, radarFrames.length - 1);
                    updateRadarFrame();
                } else {
                    loadRadarFrames().then(() => {
                        radarIndex = radarFrames.reduce((best, f, i) => !f.isNowcast ? i : best, radarFrames.length - 1);
                        updateRadarFrame();
                        sliderBar.classList.remove('visible');
                        stopRadarPlay();
                    });
                }

                // 境界線オーバーレイを前面に表示（レーダー背景の上に重ねる）
                if (map.getLayer('pref-line-overlay')) {
                    map.setLayoutProperty('world-line-overlay', 'visibility', 'visible');
                    map.setLayoutProperty('pref-line-overlay',  'visibility', 'visible');
                }

                // 観測点を最前面に（レーダー・境界線より上）
                if (map.getLayer('layer-points')) {
                    map.moveLayer('layer-points'); // 引数なし = 最上位へ
                    map.setLayoutProperty('layer-points', 'visibility', 'visible');
                    map.setPaintProperty('layer-points', 'circle-color', ['get', 'precColor']);
                    map.setPaintProperty('layer-points', 'circle-radius', getPointRadiusExpression('prec'));
                    map.setLayoutProperty('layer-points', 'circle-sort-key', ['get', 'sortPrec']);
                    map.setFilter('layer-points', ['>', ['get', 'prec'], 0]);
                }
            }
            updateLegend();
        }

        async function init() {
            const loadImage = (src) => new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = reject;
                img.src = src;
            });

            map = new maplibregl.Map({
                container: 'map',
                style: {
                    version: 8, sources: {},
                    glyphs: 'https://fonts.openmaptiles.org/{fontstack}/{range}.pbf',
                    layers: [{ id: 'background', type: 'background', paint: { 'background-color': '#000000' } }]
                },
                center: [137.0, 38.0], zoom: 5, pitch: 40, hash: true
            });

            // MapLibre内部エラーをデバッグコンソールに流す
            map.on('error', e => {
                // タイルの個別404・AbortError は正常動作なので除外
                const msg = e?.error?.message || '';
                const isTile404 = e?.error?.status === 404 && e?.tile;
                const isAbort   = msg.includes('Fetch is aborted') || msg.includes('AbortError');
                if (!isTile404 && !isAbort) {
                    console.error('[MapLibre]', msg || JSON.stringify(e));
                }
            });

            map.on('load', async () => {
                try {
                    const arrowImg = await loadImage('data:image/svg+xml;charset=utf-8,' + encodeURIComponent(arrowSvg));
                    map.addImage('wind-arrow', arrowImg, { sdf: true });

                    const [worldData, prefecturesData] = await Promise.all([
                        loadMapData(MAP_DATA_PATHS.world),
                        loadMapData(MAP_DATA_PATHS.prefectures)
                    ]);

                    map.addSource('world', { type: 'geojson', data: worldData });
                    map.addLayer({ id: 'world-fill', type: 'fill', source: 'world', paint: { 'fill-color': '#1a1a1a' } });
                    map.addLayer({ id: 'world-line', type: 'line', source: 'world', paint: { 'line-color': '#333333', 'line-width': 1 } });

                    map.addSource('prefectures', { type: 'geojson', data: prefecturesData });
                    map.addLayer({ id: 'pref-fill', type: 'fill', source: 'prefectures', paint: { 'fill-color': '#222222' } });
                    map.addLayer({ id: 'pref-line', type: 'line', source: 'prefectures', paint: { 'line-color': '#555555', 'line-width': 1.5, 'line-opacity': 0.8 } });

                    // --- 台風データのレイヤー設定 ---
                    typhoonGeojson = await fetchTyphoonData();
                    map.addSource('typhoon', { type: 'geojson', data: typhoonGeojson });
                    
                    // 警戒領域（結合されたポリゴン）の塗りつぶし
                    map.addLayer({
                        id: 'layer-typhoon-forecast-fill',
                        type: 'fill',
                        source: 'typhoon',
                        layout: { 'visibility': 'none' },
                        filter: ['==', 'type', 'forecastArea'],
                        paint: { 'fill-color': '#FFFFFF', 'fill-opacity': 0.1 }
                    });

                    // 暴風警戒域（暴風域に入るおそれのある範囲）
                    map.addLayer({
                        id: 'layer-typhoon-storm-warning-fill',
                        type: 'fill',
                        source: 'typhoon',
                        layout: { 'visibility': 'none' },
                        filter: ['==', 'type', 'stormWarningArea'],
                        paint: { 'fill-color': '#FF2800', 'fill-opacity': 0.12 }
                    });

                    map.addLayer({
                        id: 'layer-typhoon-storm-warning-line',
                        type: 'line',
                        source: 'typhoon',
                        layout: { 'visibility': 'none' },
                        filter: ['==', 'type', 'stormWarningArea'],
                        paint: { 'line-color': '#FF2800', 'line-width': 2.5, 'line-opacity': 0.95 }
                    });

                    // 警戒領域（結合されたポリゴン）の外枠線（美しく繋がった実線）
                    map.addLayer({
                        id: 'layer-typhoon-forecast-area-line',
                        type: 'line',
                        source: 'typhoon',
                        layout: { 'visibility': 'none' },
                        filter: ['==', 'type', 'forecastArea'],
                        paint: { 'line-color': '#FFFFFF', 'line-width': 1.5, 'line-opacity': 0.6 }
                    });

                    // 個別の予報円（点線）
                    map.addLayer({
                        id: 'layer-typhoon-forecast-circle-line',
                        type: 'line',
                        source: 'typhoon',
                        layout: { 'visibility': 'none' },
                        filter: ['==', 'type', 'forecastCircle'],
                        paint: { 'line-color': '#FFFFFF', 'line-width': 1.4, 'line-dasharray': [3, 4], 'line-opacity': 0.8 }
                    });

                    // 暴風域・強風域
                    map.addLayer({
                        id: 'layer-typhoon-area',
                        type: 'fill',
                        source: 'typhoon',
                        layout: { 'visibility': 'none' },
                        filter: ['in', 'type', 'stormArea', 'windArea'],
                        paint: {
                            'fill-color': ['match', ['get', 'type'], 'stormArea', '#FF2800', 'windArea', '#FFEF00', '#FFFFFF'],
                            'fill-opacity': 0.35
                        }
                    });

                    // 過去の中心経路
                    map.addLayer({
                        id: 'layer-typhoon-past-track',
                        type: 'line',
                        source: 'typhoon',
                        layout: { 'visibility': 'none' },
                        filter: ['==', 'type', 'pastTrack'],
                        paint: { 'line-color': '#FFFFFF', 'line-width': 1.6, 'line-opacity': 0.55 }
                    });

                    // 予測中心経路
                    map.addLayer({
                        id: 'layer-typhoon-track',
                        type: 'line',
                        source: 'typhoon',
                        layout: { 'visibility': 'none' },
                        filter: ['==', 'type', 'track'],
                        paint: { 'line-color': '#FFFFFF', 'line-width': 2, 'line-dasharray': [3, 3], 'line-opacity': 0.75 }
                    });

                    // 中心点
                    map.addLayer({
                        id: 'layer-typhoon-center',
                        type: 'circle',
                        source: 'typhoon',
                        layout: { 'visibility': 'none' },
                        filter: ['==', 'type', 'center'],
                        paint: { 'circle-radius': 8, 'circle-color': '#FF2800', 'circle-stroke-width': 2, 'circle-stroke-color': '#FFFFFF' }
                    });

                    // --- 警報エリアのレイヤー設定 ---
                    warningAreasGeojson = await loadMapData('warning_areas.json');
                    // 初期stateとしてwarnColor='transparent'を付与
                    warningAreasGeojson = {
                        ...warningAreasGeojson,
                        features: warningAreasGeojson.features.map(f => ({
                            ...f,
                            properties: { ...f.properties, warnLevel: '', warnColor: 'transparent' }
                        }))
                    };
                    map.addSource('warning-areas', { type: 'geojson', data: warningAreasGeojson });

                    // 市区町村塗りつぶし
                    map.addLayer({
                        id: 'layer-warning-fill',
                        type: 'fill',
                        source: 'warning-areas',
                        layout: { visibility: 'none' },
                        paint: {
                            'fill-color': ['get', 'warnColor'],
                            'fill-opacity': 0.55
                        }
                    });

                    // 市区町村境界線
                    map.addLayer({
                        id: 'layer-warning-line',
                        type: 'line',
                        source: 'warning-areas',
                        layout: { visibility: 'none' },
                        paint: {
                            'line-color': 'rgba(255,255,255,0.25)',
                            'line-width': 0.6
                        }
                    });

                    // ポリゴンクリックで詳細表示
                    map.on('click', 'layer-warning-fill', (e) => {
                        const props = e.features[0].properties;
                        if (!props.warnLevel) return;
                        const code = props.regioncode;
                        const warn = warningMap[code];
                        if (!warn) return;
                        showWarningDetail(props.name, warn.kinds);
                    });
                    map.on('mouseenter', 'layer-warning-fill', () => map.getCanvas().style.cursor = 'pointer');
                    map.on('mouseleave', 'layer-warning-fill', () => map.getCanvas().style.cursor = '');

                    // --- AMeDASデータの取得 ---
                    const timeRes = await fetch(`${JMA_BASE}/data/latest_time.txt`);
                    const datetime = (await timeRes.text()).trim();
                    _amedasLastTimestamp = datetime; // スケジューラーの差分チェック基準として記録
                    const mapTime = datetime.replace(/[-T:]/g, '').substring(0, 14);
                    currentObsTime = `${mapTime.substring(8,10)}:${mapTime.substring(10,12)}`;
                    document.getElementById('status-bar').innerText = `LIVE: ${currentObsTime} 観測`;

                    const [tableRes, dataRes] = await Promise.all([
                        fetch(`${JMA_BASE}/const/amedastable.json`),
                        fetch(`${JMA_BASE}/data/map/${mapTime}.json`)
                    ]);
                    amedasTable = await tableRes.json();
                    const amedasData = await dataRes.json();

                    geojson.features = Object.keys(amedasData).map(id => {
                        const master = amedasTable[id];
                        if (!master) return null;
                        const obs = amedasData[id];
                        
                        const temp = obs.temp !== undefined ? obs.temp[0] : null;
                        const prec = obs.precipitation1h !== undefined ? obs.precipitation1h[0] : null;
                        const windSpd = obs.wind !== undefined ? obs.wind[0] : null;
                        const windDir = obs.windDirection !== undefined ? obs.windDirection[0] : 0; 

                        return {
                            type: 'Feature',
                            geometry: { type: 'Point', coordinates: [master.lon[0] + master.lon[1]/60, master.lat[0] + master.lat[1]/60] },
                            properties: {
                                id, type: 'amedas', name: master.kjName,
                                temp: temp, prec: prec, wind: windSpd, windDir: windDir, 
                                hum: obs.humidity !== undefined ? obs.humidity[0] : null,
                                sortTemp: temp !== null ? temp : -100,
                                sortPrec: prec !== null ? prec : -1,
                                sortWind: windSpd !== null ? windSpd : -1,
                                sizeTemp: temp !== null ? Math.abs(temp) : 0,
                                sizePrec: prec !== null ? prec : 0,
                                tempColor: getTempColor(temp),
                                precColor: getPrecColor(prec)
                            }
                        };
                    }).filter(f => f !== null && f.geometry.coordinates[0]);

                    map.addSource('amedas', { type: 'geojson', data: geojson });
                    
                    map.addLayer({ 
                        id: 'layer-points', 
                        type: 'circle', 
                        source: 'amedas', 
                        filter: ['!=', ['get', 'temp'], null],
                        layout: { 'circle-sort-key': ['get', 'sortTemp'] },
                        paint: { 
                            'circle-radius': getPointRadiusExpression('temp'), 
                            'circle-color': ['get', 'tempColor'], 
                            'circle-stroke-width': 1.5, 
                            'circle-stroke-color': '#000000' 
                        } 
                    });
                    
                    map.addLayer({ 
                        id: 'layer-wind', 
                        type: 'symbol', 
                        source: 'amedas',
                        filter: ['!=', ['get', 'wind'], null],
                        layout: { 
                            'visibility': 'none', 
                            'icon-image': 'wind-arrow', 
                            'symbol-sort-key': ['get', 'sortWind'],
                            'icon-size': ['interpolate', ['linear'], ['get', 'wind'], 0, 0.4, 2, 0.6, 5, 1.0, 10, 1.6, 20, 2.4],
                            'icon-rotate': ['+', ['*', ['get', 'windDir'], 22.5], 180], 
                            'icon-allow-overlap': true,
                            'icon-ignore-placement': true 
                        }, 
                        paint: { 
                            'icon-opacity': ['case', ['==', ['get', 'windDir'], 0], 0, 1],
                            'icon-color': ['step', ['get', 'wind'], '#0099FF', 5, '#00FFFF', 10, '#00FF00', 15, '#FFEF00', 20, '#FF9900', 25, '#FF2800', 30, '#B40068']
                        } 
                    });

                    map.on('click', 'layer-points', (e) => showDetail(e.features[0].properties));
                    map.on('click', 'layer-wind', (e) => showDetail(e.features[0].properties));
                    map.on('click', 'layer-typhoon-center', (e) => showDetail(e.features[0].properties));
                    
                    // マウスカーソルをポインターにする
                    ['layer-points', 'layer-wind', 'layer-typhoon-center'].forEach(layer => {
                        map.on('mouseenter', layer, () => map.getCanvas().style.cursor = 'pointer');
                        map.on('mouseleave', layer, () => map.getCanvas().style.cursor = '');
                    });

                    // 境界線オーバーレイ: レーダー・キキクル等の前面に常に表示
                    // loadRadarFrames に依存せず、地図ロード時に必ず追加しておく
                    map.addLayer({
                        id: 'world-line-overlay', type: 'line', source: 'world',
                        layout: { visibility: 'none' },
                        paint: { 'line-color': '#666666', 'line-width': 1.2, 'line-opacity': 1 }
                    });
                    map.addLayer({
                        id: 'pref-line-overlay', type: 'line', source: 'prefectures',
                        layout: { visibility: 'none' },
                        paint: { 'line-color': '#bbbbbb', 'line-width': 2.0, 'line-opacity': 1 }
                    });

                    setMode('temp', false);
                    startAllSchedulers();
                } catch (e) { console.error("Initialization failed:", e); }

            });
        }

        // ============================================================
        //  自動更新：各データリフレッシュ関数
        // ============================================================

        // --- 雨雲レーダー更新 ---
        async function refreshRadar() {
            try {
                const t0 = performance.now();
                await loadRadarFrames();
                const elapsed = Math.round(performance.now() - t0);

                // AMeDASサブモード かつ precタブ表示中 → 最新観測フレームに固定
                if (currentMode === 'prec' && precSubMode === 'amedas') {
                    radarIndex = radarFrames.reduce((best, f, i) => !f.isNowcast ? i : best, radarFrames.length - 1);
                    updateRadarFrame();
                }

                const latest = radarFrames[radarFrames.length - 1];
                const obs    = radarFrames.filter(f => !f.isNowcast);
                const nowc   = radarFrames.filter(f =>  f.isNowcast);
                console.log(
                    `[レーダー] 更新完了 ${elapsed}ms | ` +
                    `全${radarFrames.length}フレーム (観測${obs.length}件 / 予測${nowc.length}件) | ` +
                    `最新basetime: ${latest?.basetime ?? '-'} | validtime: ${latest?.validtime ?? '-'}`
                );
            } catch (e) {
                console.warn('[レーダー] 更新失敗:', e);
            }
        }

        // --- 台風情報更新 ---
        async function refreshTyphoon() {
            try {
                const t0         = performance.now();
                const newGeojson = await fetchTyphoonData();
                const elapsed    = Math.round(performance.now() - t0);
                typhoonGeojson   = newGeojson;
                if (map.getSource('typhoon')) map.getSource('typhoon').setData(typhoonGeojson);
                // マーカーの再生成は台風タブ表示中のみ（バックグラウンド時はスキップ、タブ切り替え時に setMode が呼ぶ）
                if (currentMode === 'typhoon') {
                    clearForecastTimeMarkers();
                    updateForecastTimeMarkers(true);
                }
                const tcCount = newGeojson.features?.filter(f => f.properties?.type === 'center').length ?? 0;
                console.log(`[台風] 更新完了 ${elapsed}ms | 活動中台風: ${tcCount}件`);
            } catch (e) {
                console.warn('[台風] 更新失敗:', e);
            }
        }

        // --- 気象警報・洪水情報更新 ---
        async function refreshWarning() {
            try {
                const t0 = performance.now();
                warningMap = {};
                await Promise.all([fetchWarningData(), fetchFloodWarningData()]);
                const elapsed      = Math.round(performance.now() - t0);
                const regionCount  = Object.keys(warningMap).length;
                applyWarningColors();
                warningLoaded = true;
                if (currentMode === 'warning') {
                    document.getElementById('status-bar').innerText = '警報情報 更新済';
                    updateRanking();
                }
                console.log(`[警報] 更新完了 ${elapsed}ms | 警報発令地域: ${regionCount}件`);
            } catch (e) {
                console.warn('[警報] 更新失敗:', e);
            }
        }

        // ============================================================
